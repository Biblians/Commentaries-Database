summary = "Syncletica of Alexandria was a Christian saint, ascetic, anchorite, and Desert Mother from Roman Egypt in the 4th century AD. She is the subject of The Life of Syncletica, a Greek hagiography purportedly by Athanasius of Alexandria but not published until 450; and the Alphabetical and Systematic Apophthegmata, which included 28 of her sayings and teachings. She died at the age of 80, after a three-year-long illness from mouth cancer."
