summary = 'Pseudo-Hegesippus is the conventional name of the anonymous author of De excidio Hierosolymitano, a fourth-century Christian Latin adaptation of The Jewish War of Flavius Josephus. The text itself may also be referred to as "Pseudo-Hegesippus".'
