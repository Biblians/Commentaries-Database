summary = "The Liturgy of Saint James is a form of Christian liturgy used by some Eastern Christians of the Byzantine rite and West Syriac Rite. It is developed from an ancient Egyptian form of the Basilean anaphoric family, and is influenced by the traditions of the rite of the Church of Jerusalem, as the Mystagogic Catecheses of Cyril of Jerusalem imply. It became the primary Divine Liturgy in the Church of Antioch and Church of Jerusalem in the early fifth century, soon becoming supplanted by the liturgies of Saint Basil and Saint John Chrysostom. It is still the principal liturgy of the Syriac Orthodox Church, the Malankara Orthodox Syrian Church, the Maronite Church, the Syriac Catholic Church, the Malankara Jacobite Syrian Church, the Syro-Malankara Catholic Church and other churches employing the West Syriac Rite. It is also occasionally used in the Eastern Orthodox Church and Melkite Catholic Church. The Malankara Mar Thoma Syrian Church uses a reformed variant of this liturgy, omitting intercession of saints and prayer for the dead."
