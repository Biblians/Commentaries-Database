summary = 'Douglas James Wilson is an American conservative Reformed and evangelical Christian theologian and pastor. Wilson leads Christ Church in Moscow, Idaho, in which capacity he has taken leading roles in the Communion of Reformed Evangelical Churches and the classical Christian education movement. He is a public proponent of postmillennialism, Christian nationalism, covenant theology, and biblical patriarchy. Wilson, a self-described "paleo-Confederate", first garnered extensive media coverage in 2004, when he held a conference which publicized his controversial stance on American slavery.'
