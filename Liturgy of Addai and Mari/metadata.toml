summary = "The Liturgy of Addai and Mari is the Eucharistic liturgy belonging to the East Syriac Rite and was historically used in the Church of the East of the Sasanian (Persian) Empire. This liturgy is traditionally attributed to Saint Addai and Saint Mari. It is currently in regular use in the Assyrian Church of the East, the Ancient Church of the East, the Syro-Malabar Catholic Church of India, and the Chaldean Catholic Church. The latter two are Eastern Catholic churches in full communion with the Holy See of Rome."
