summary = "Paulinus of Nola born Pontius Meropius Anicius Paulinus, was a Roman poet, writer, senator, and bishop. He attained the ranks of suffect consul and governor of Campania, but, prompted by the counsels of his Hispanic wife Therasia of Nola and by the assassination of the emperor Gratian, abandoned his career and was baptized as a Christian. Later, probably after Therasia's death, he became bishop of Nola in Campania. While there, he wrote poems in honor of his predecessor Saint Felix and corresponded with other Christian leaders throughout the empire. He is credited with the introduction of bells to Christian worship and helped resolve the disputed election of Pope Boniface I."
