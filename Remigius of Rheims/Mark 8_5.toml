[[commentary]]
quote='''
Ignorance was not His reason for asking them, but that from their answering seven, the miracle might be noised abroad, and become more known in proportion to the smallness of the number.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title="Catena Aurea by Aquinas"
