[[commentary]]
quote='''
The Magi obeyed the King so far as to seek the Lord, but not to return to Herod. Like in this to good hearers; the good they hear from wicked preachers, that they do; but do not imitate their evil lives.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25202.html'
source_title="Catena Aurea by Aquinas"
