[[commentary]]
quote='''
My brethren, shun not only the holding, but even the hearing, of the judgment that bans mercy; for better is mercy than all whole burnt-offerings and sacrifices.
'''
uuid = "6955ce63-8ca5-455f-8fda-10306e85e7ef"


