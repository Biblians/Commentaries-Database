summary = "Primasius was bishop of Hadrumetum and primate of Byzacena, in Africa. One of the participants in the Three Chapters Controversy, his commentary on the Book of Revelation is of interest to modern scholars for its use of the lost commentary of Ticonius on the same book of the New Testament. According to M.L.W. Laistner, his disciples included the African theologian Junillus."
