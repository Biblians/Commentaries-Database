summary = "Desiderius Erasmus Roterodamus, commonly known in English as Erasmus of Rotterdam or simply Erasmus, was a Dutch humanist, Catholic theologian, and pioneering philologist and educationalist. He was, through his writings and translations, one of the most influential scholars of the Northern Renaissance and a major figure of Western culture."
