summary = "Karpasia, Latinized as Carpasia, and also known as Karpasion, was an ancient town in Cyprus, situated on the northern shore of the Karpas Peninsula, 3 km (1.9 mi) from the modern town of Rizokarpaso. According to tradition, it was founded by the Phoenician king Pygmalion of Tyre. It had a harbour, whose moles remain visible to this day."
