summary = "Pope Dionysius was the Bishop of Rome from 22 July 259 to 26 December 268. His pontificate oversaw the transition from Valerian's persecutions to the toleration issued by Gallienus in 260. During this period, he reorganized the Roman church, assigning presbyters to individual parishes."
