summary = "Gregory of Nazianzus, also known as  Saint Gregory the Theologian or Gregory Nazianzen, was an early Roman Christian theologian and prelate who served as Archbishop of Constantinople from 380 to 381. He is widely considered the most accomplished rhetorical stylist of the patristic age. As a classically trained orator and philosopher, he infused Hellenism into the early Church, establishing the paradigm of Byzantine theologians and church officials."
