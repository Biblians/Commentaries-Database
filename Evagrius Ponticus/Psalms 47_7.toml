[[commentary]]
quote='''
Pray as is fitting and without trouble, practice psalmody with understanding and harmony, and you will be like a young eagle soaring in the heights.
'''
source_url='https://archive.org/details/syriacfathersonp1987unse/page/66/mode/2up'
source_title="CHAPTERS ON PRAYER 82"
uuid = "70291cc1-33bd-40bc-ace3-678310f15e54"
