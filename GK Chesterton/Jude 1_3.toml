[[commentary]]
quote='''
People will tell you, for instance, that theology became elaborate because it was dead. Believe me, if it had been dead it would never have become elaborate; it is only the live tree that grows too many branches.
'''
time=1909
source_url=''
source_title="A Great Man (Tremendous Trifles)"
