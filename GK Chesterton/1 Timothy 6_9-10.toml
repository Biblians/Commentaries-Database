[[commentary]]
quote='''
There is an article called "The Instinct that Makes People Rich." It is decorated in front with a formidable portrait of Lord Rothschild. There are many definite methods, honest and dishonest, which make people rich; the only "instinct" I know of which does it is that instinct which theological Christianity crudely describes as "the sin of avarice."
'''
source_url=''
source_title="All Things Considered, The Fallacy of Success (1908)"
uuid = "cf2ccabc-681a-4b22-abb8-1dc0f479863a"

[[commentary]]
quote='''
Yet again and again, over the grave of every one of those sad rich men, for whom one should surely feel, first and last, a speechless pity—over the grave of Beit, over the grave of Whiteley—this sickening nonsense about modesty and simplicity has been poured out.
'''
source_url=''
source_title="All Things Considered, The Worship of the Wealthy (1908)"
uuid = "708d8922-a2ac-45ec-9f40-dea866c87d18"
