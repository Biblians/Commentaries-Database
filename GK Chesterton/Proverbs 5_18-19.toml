[[commentary]]
quote='''
The same principle (by the way) applies to the difficult problem of wives. Variability is one of the virtues of a woman. It avoids the crude requirement of polygamy. So long as you have one good wife you are sure to have a spiritual harem.
'''
source_url=''
source_title="Alarms and Discursions, The Glory of Grey"
