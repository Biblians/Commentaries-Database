[[commentary]]
quote='''
It is true that there is a thing crudely called charity, which means charity to the deserving poor; but charity to the deserving is not charity at all, but justice. It is the undeserving who require it, and the ideal either does not exist at all, or exists wholly for them.
'''
source_url=''
source_title="Heretics, Ch. 12: Paganism and Mr. Lowes Dickinson (1905)"
uuid = "b4fdc6e2-b32c-410d-899d-70c80ee7d262"

[[commentary]]
quote='''
Every generous person will admit that the one kind of sin which charity should cover is the sin which is inexcusable.
'''
source_url=''
source_title="Heretics, Ch. 12: Paganism and Mr. Lowes Dickinson (1905)"
uuid = "dc6789f1-ecad-4348-9660-659824321d9f"
