[[commentary]]
quote='''
The beasts that perish are more hygienic than man, and man is only above them because he is more conventional.
'''
time=1908
source_url=''
source_title="Christmas (All Things Considered)"
uuid = "326175e6-be82-4bde-af5d-1d5a20d7860f"

[[commentary]]
quote='''
It is not natural to see man as a natural product. It is not common sense to call man a common object of the country or the seashore. It is not seeing straight to see him as an animal. It is not sane. It sins against the light; against that broad daylight of proportion which is the principle of all reality.
'''
time=1925
source_url=''
source_title="The Everlasting Man, Chapter I: The Man in the Cave (1925)"
uuid = "cbbfebf8-2bc9-4eb2-84ec-3c5352229602"
