[[commentary]]
quote='''
All that he is concerned with is the description of a definite and very real type of young man; the young man whose passions and whose selfish necessities sometimes seemed to be stronger than anything else in him.
'''
source_url=''
source_title="All Things Considered, Tom Jones and Morality (1908)"
uuid = "f15855f6-479b-4270-9bf1-6ae4edb7677d"
