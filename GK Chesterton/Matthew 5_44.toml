[[commentary]]
quote='''
That was why it seemed such a thrilling paradox to say that we must love foreigners; it had in it the divine paradox that we must love enemies.
'''
source_url=''
source_title="The Catholic Church and Conversion, Ch. 2: The Obvious Blunders (1926)"
