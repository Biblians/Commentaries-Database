[[commentary]]
quote='''
It was the Babylon Hotel. It was the perfect symbol of everything that I should like to pull down with my hands if I could. Reared by a detected robber, it is framed to be the fashionable and luxurious home of undetected robbers. In the house of man are many mansions; but there is a class of men who feel normal nowhere except in the Babylon Hotel or in Dartmoor Gaol.
'''
time=1909
source_url=''
source_title="Tremendous Trifles, XX. The Giant (1909)"
uuid = "cbbc5755-2d07-4ce7-93b2-62d0e318218c"
