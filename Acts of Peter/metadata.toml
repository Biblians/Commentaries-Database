summary = "The Acts of Peter is one of the earliest of the apocryphal Acts of the Apostles in Christianity, dating to the late 2nd century AD. The majority of the text has survived only in the Latin translation of the Codex Vercellensis, under the title Actus Petri cum Simone. It is notable for a description of a miracle contest between Saint Peter and Simon Magus, the first record of the tradition that Saint Peter was crucified head-down, and as the origin of the saying Quo vadis?"
