[[commentary]]
quote='''
The imitator of God and Christ makes the sun of his word and the brightness of his righteousness to shine on both evil and good people, and the rain from his mouth falls upon both the righteous and the sinful.
'''
source_url=''
source_title="FRAGMENT 42"
