[[commentary]]
quote='''
Seeing he knew his thoughts, he said, "Just as he knows this, he knows also all that I have done." He therefore said, "All that I have unjustly received, I give back fourfold."
'''
source_url=''
source_title="COMMENTARY ON TATIAN'S DIATESSARON 20"
