[[commentary]]
quote='''
"My spirit is broken" in bitterness and pain, because my ulcers torture me, or, on the other hand, because of my friends, who are ready to burst out against their friend.
'''
source_url=''
source_title="COMMENTARY ON JOB 17:1-2"
