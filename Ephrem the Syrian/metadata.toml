summary = "Ephrem the Syrian, also known as Ephraem the Deacon, Ephrem of Edessa or Aprem of Nisibis was a prominent Christian theologian and writer who is revered as one of the most notable hymnographers and authors of Syriac literature in Eastern Christianity. He was born in Nisibis, served as a deacon and later lived in Edessa."
