summary = "Aphrahat, venerated as Saint Aphrahat the Persian, was a third-century Syriac Christian author of Iranian descent from the Sasanian Empire, who composed a series of twenty-three expositions or homilies on points of Christian doctrine and practice. All his known works, the Demonstrations, come from later on in his life. He was an ascetic and celibate, and was almost definitely a son of the covenant. He may have been a bishop, and later Syriac tradition places him at the head of Mar Mattai Monastery near Mosul in what is now northern Iraq. He was a near contemporary to the slightly younger Ephrem the Syrian, but the latter lived within the sphere of the Roman Empire. Called the Persian Sage, Aphrahat witnessed to the concerns of the early church beyond the eastern boundaries of the Roman Empire."
