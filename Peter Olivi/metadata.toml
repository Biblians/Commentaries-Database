summary = "Peter John Olivi, also Pierre de Jean Olivi or Petrus Joannis Olivi, was a French Franciscan theologian and philosopher who, although he died professing the faith of the Roman Catholic Church, remained a controversial figure in the arguments surrounding poverty at the beginning of the 14th century. In large part, this was due to his view that the Franciscan vow of poverty also entailed usus pauper. While contemporary Franciscans generally agreed that usus pauper was important to the Franciscan way of life, they disagreed that it was part of their vow of poverty. His support of the rigorous view of ecclesiastical poverty played a part in the ideology of the groups coming to be known as the Spiritual Franciscans or Fraticelli."
