summary = "Jacob of Edessa or James of Edessa was a Syriac Orthodox bishop of Edessa, scholar, and translator. Renowned for his multilingual mastery, he made lasting contributions to biblical revision, canon law, grammar and liturgy, and played a key role in standardizing theological terminology. His synthesis of Greek and Syriac traditions shaped the development of Syriac Christianity and facilitated the transmission of Hellenistic thought into the Islamic world."
