[[commentary]]
quote='''
When John says that there is no darkness in the light of God, he proves that all the lights of others are stained by some blemish.
'''
source_url='https://www.newadvent.org/fathers/30112.htm'
source_title="Against the Pelagians 2.7"
uuid = "f3e672dc-856b-4091-a2f7-57d5b7188d81"
