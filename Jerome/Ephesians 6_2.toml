[[commentary]]
quote='''
A promise is attached to this commandment.… It is found in the Decalogue. It is the first command in the second table of the law. It was given to the people as they were leaving Egypt.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ephesians.html'
source_title="Commentary on Ephesians 6:1"
uuid = "2777b35a-1bf4-400d-8dd8-6629c624e50e"
