[[commentary]]
quote='''
He who declared that he had observed all the commandments had already yielded to the power of riches from the very outset.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome/Letters/letter_118.html'
source_title="LETTER 118, TO JULIAN"
uuid = "8184bc85-82d7-4585-be8e-e2c103c80f6e"
