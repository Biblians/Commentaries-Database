[[commentary]]
quote='''
As if to show that near relationship is no safeguard, Amnon burned with illicit passion for his sister Tamar.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome/Letters/letter_022.html'
source_title="LETTER 22.12"
