[[commentary]]
quote='''
(Verse 35) For I have come to set a man against his father, and a daughter against her mother, and a daughter-in-law against her mother-in-law; and a man's enemies will be those of his own household. This passage is written in almost the same words in the prophet Micah (Micah 7). And it should be noted whenever a testimony from the Old Testament is presented, whether the meaning alone or also the wording agrees.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"
uuid = "63e8bc7a-edc1-47d8-8ea0-7ccc0f446b7f"


[[commentary]]
quote='''
These are almost the words of the Prophet Micah. (Mic. 7:6.) We should always take note when a passage is cited out of the Old Testament, whether the sense only, or the very words are given.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252010.html'
source_title="Catena Aurea by Aquinas"
uuid = "6c747605-e4f3-496b-b012-f09c582c2474"
