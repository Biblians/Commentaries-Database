[[commentary]]
quote='''
(Verse 28.) And behold, a flame was rising from the earth like the vapor of a furnace. Regarding this, we read in Hebrew: Behold, a rising (ἀναθυμίασις) of the furnace, which we can call vapor, smoke, or ashes.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHebrew%2520Questions%2520on%2520Genesis.html'
source_title="Hebrew Questions on Genesis"
uuid = "15c43669-03b9-48d2-9701-4a2bb9f1c25d"
