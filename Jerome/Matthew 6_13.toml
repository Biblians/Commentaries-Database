[[commentary]]
quote='''
Amen, which appears here at the close, is the seal of the Lord's Prayer. Aquila rendered 'faithfully'—we may perhaps 'truly.'
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25206.html'
source_title="Catena Aurea by Aquinas"
uuid = "3b3937a0-dc08-464e-847e-a098f4a4e56b"

[[commentary]]
quote='''
Amen. The sign of the Lord's Prayer is: which the Eagle interprets faithfully: we, truly, can say.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"
uuid = "62e7be56-245a-4bab-8fbc-66e1f733e3b9"
