[[commentary]]
quote='''
(in Matt. 15) Wonderful is the folly of the Pharisees and Scribes; they accuse the Son of God, because He keeps not the traditions and precepts of men.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25207.html'
source_title="Catena Aurea by Aquinas"
