[[commentary]]
quote='''
At that time he had a notorious prisoner called Barabbas. Now, in the Gospel written according to the Hebrews, 'the son of their teacher' is interpreted as referring to this man, who had been condemned for sedition and murder.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"
uuid = "157937af-0d89-492a-a77b-d075efe0ebb6"

[[commentary]]
quote='''
In the Gospel entitled 'according to the Hebrews,' Barabbas is interpreted, 'The son of their master,' who had been condemned for sedition and murder.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252027.html'
source_title="Catena Aurea by Aquinas"
uuid = "6e6a58c3-3e9a-4633-ae30-e1ecdea69345"
