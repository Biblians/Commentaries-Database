[[commentary]]
quote='''
He is drawing a comparison, therefore, between the law and the gospel. Farther, he says: "I have baptized you with water," that is, the law; "but he will baptize you with the Holy Spirit," that is the gospel.
'''
source_url=''
source_title="HOMILY 76"
uuid = "23e707e0-7de3-4060-a54a-ebd83c59020a"

[[commentary]]
quote='''
No baptism can be called perfect except that which depends on the cross and resurrection of Christ.
'''
source_url='https://www.newadvent.org/fathers/3005.htm'
source_title="THE DIALOGUE AGAINST THE LUCIFERIANS 7"
uuid = "3a76a09c-51cf-4fa1-80b0-73df146aa3cb"

[[commentary]]
quote='''
For what is the difference between water and the Holy Ghost, who was borne over the face of the waters? Water is the ministry of man; but the Spirit is ministered by God.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25201.html'
source_title="Catena Aurea by Aquinas"
uuid = "91aacd87-bd57-4986-b22c-404eae5b3ebb"
