[[commentary]]
quote='''
(Verse 11.) And they took all the cavalry of Sodom and Gomorrah. For cavalry in Hebrew has Rachus (), which means substance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHebrew%2520Questions%2520on%2520Genesis.html'
