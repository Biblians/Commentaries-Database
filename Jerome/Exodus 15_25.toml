[[commentary]]
quote='''
As wood sweetens Marah so that seventy palm trees are watered by its streams, so the cross makes the waters of the law lifegiving to the seventy who are Christ's apostles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome/Letters/letter_069.html'
source_title="LETTER 69.6"
uuid = "5e4d1604-c312-4b79-8bb3-f999ef36a382"
