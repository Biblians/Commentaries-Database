[[commentary]]
quote='''
(Verse 9.) He who has ears to hear, let him hear. We are prompted to understand these sayings whenever we are moved by these words.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"
uuid = "d6ee6c6d-cf17-4906-8961-fd04a5dcded1"

[[commentary]]
quote='''
And we are excited to the understanding of His words, by the advice which follows, He that hath ears to hear, let him hear.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252013.html'
source_title="Catena Aurea by Aquinas"
uuid = "c42321d7-33d9-41b4-a57b-f75709172fdc"
