[[commentary]]
quote='''
(Verse 6.) But on Herod's birthday, Herodias' daughter danced in the midst, and it pleased Herod. We have found no other to have observed their own birthday except Herod and Pharaoh, as their impiety was on equal terms, so too was their festivity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"
uuid = "a93fe036-8fcf-4b24-b5e5-5c9487b3e490"

[[commentary]]
quote='''
We find no others keeping their birthday besides Herod and Pharaoh, that they who were alike in their wickedness might be alike in their festivities.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252014.html'
source_title="Catena Aurea by Aquinas"
uuid = "4ee38ee3-330a-408c-9b1d-2fa46c198f4e"
