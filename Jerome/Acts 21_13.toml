[[commentary]]
quote='''
The battering ram of natural affection, which so often shatters faith, must recoil powerless from the wall of the gospel.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome/Letters/letter_014.html'
source_title="LETTER 14.3"
uuid = "f155ca16-13bc-4613-83c1-1a1aa4247a8c"
