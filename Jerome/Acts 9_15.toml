[[commentary]]
quote='''
Why is the apostle Paul called a chosen vessel? Assuredly because he is a repertory of the law and of the holy Scriptures.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome/Letters/letter_053.html'
source_title="LETTER 53.3"
uuid = "0b3898ad-6440-4875-9a54-dc7ac1c9cdb4"
