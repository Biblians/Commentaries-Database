summary = """The Clementine literature is a late antique third-century Christian romance containing an account of the conversion of Clement of Rome to Christianity, his subsequent life and travels with the apostle Peter and an account of how they became traveling companions, Peter's discourses, and finally Clement's family history and eventual reunion with his family. To reflect the pseudonymous nature of the authorship, the author is sometimes referred to as Pseudo-Clement. In all likelihood, the original text went by the name of Periodoi Petrou ; sometimes historians refer to it as the "Grundschrift"."""
