summary = 'The Sibylline Oracles are a collection of oracular utterances written in Greek hexameters ascribed to the Sibyls, prophetesses who uttered divine revelations in a frenzied state. Fourteen books and eight fragments of Sibylline Oracles survive, in an edition of the 6th or 7th century AD. They are not to be confused with the original Sibylline Books of the ancient Etruscans and Romans which were burned by order of the Roman general Flavius Stilicho in the 4th century AD. Instead, the text is an "odd pastiche" of Hellenistic and Roman mythology interspersed with Jewish, Gnostic and early Christian legend.'
