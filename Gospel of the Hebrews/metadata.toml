summary = "The Gospel of the Hebrews, or Gospel according to the Hebrews, is a lost Jewish–Christian gospel. The text of the gospel is lost, with only fragments of it surviving as brief quotations by the early Church Fathers and in apocryphal writings. The fragments contain traditions of Jesus' pre-existence, incarnation, baptism, and probably of his temptation, along with some of his sayings. Distinctive features include a Christology characterized by the belief that the Holy Spirit is Jesus' Divine Mother and a first resurrection appearance to James, the brother of Jesus, showing high regard for James as the leader of the Jewish Christian church in Jerusalem. It was probably composed in Greek in the first decades of the 2nd century and is believed to have been used by Greek-speaking Jewish Christians in Egypt during that century."
