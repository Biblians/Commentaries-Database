[[commentary]]
quote='''
"First fruits" and "root" both refer here to the patriarchs, the lawgiver and the prophets. "Lump" and "branches" refer to the whole of the Jewish people.
'''
source_url=''
source_title="PAULINE COMMENTARY FROM THE GREEK CHURCH"
