summary = "Diodore of Tarsus was a Christian bishop, monastic reformer, and theologian. A strong supporter of the orthodoxy of Nicaea, Diodore played a pivotal role in the Council of Constantinople and opposed the anti-Christian policies of Julian the Apostate. Diodore founded one of the most influential centers of Christian thought in the early church, and many of his students became notable theologians in their own right."
