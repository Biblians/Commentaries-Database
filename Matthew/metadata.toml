summary = "The Gospel of Matthew is the first book of the New Testament and one of the three synoptic Gospels. It tells the story of who the author believes is Israel's messiah (Christ), Jesus, his resurrection, and his mission to the world. The Gospel of Matthew presents Jesus as the fulfillment of Jewish prophecy."
