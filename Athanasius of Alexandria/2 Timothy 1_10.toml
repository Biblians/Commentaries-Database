[[commentary]]
quote='''
"From Adam to Moses death reigned"; but the presence of the Word abolished death. No longer in Adam are we all dying. In Christ we are all reviving.
'''
source_url='https://www.newadvent.org/fathers/28161.htm'
source_title="Discourses Against the Arians 1.59.8"
uuid = "5deb1941-1026-4005-99bf-7ad33f4111b8"
