summary = "John I of Antioch was Patriarch of Antioch. He led a group of moderate Eastern bishops during the Nestorian controversy. He is sometimes confused with John Chrysostom, who is occasionally also referred to as John of Antioch. John I gave active support to his friend Nestorius in the latter's dispute with Cyril of Alexandria. In the year 431, he arrived too late for the opening meeting of the First Council of Ephesus. Cyril, suspecting John I of using procrastinating tactics to support Nestorius, decided not to wait and convened the council without John I and his supporters, condemning Nestorius. When John I reached Ephesus a few days after the council had begun, he convened a counter-council that condemned Cyril and vindicated Nestorius."
