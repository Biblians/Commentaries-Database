summary = """Arethas of Caesarea was Archbishop of Caesarea Mazaca in Cappadocia early in the 10th century, and is considered one of the most scholarly theologians of the Greek Orthodox Church. The codices produced by him, containing his commentaries are credited with preserving many ancient texts, including those of Plato and Marcus Aurelius' "Meditations"."""
