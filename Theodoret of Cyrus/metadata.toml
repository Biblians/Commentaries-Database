summary = """Theodoret of Cyrus or Cyrrhus was a notable theologian of the School of Antioch, biblical commentator, and bishop of Cyrrhus (423–457). He participated in several 5th-century Christological controversies within the Eastern Roman Church that resulted in various ecumenical acts and schisms. Theodoret wrote against Cyril of Alexandria's Twelve Anathemas, which were sent to Nestorius, and did not condemn Nestorius until the Council of Chalcedon. Selected writings by Theodoret directed against Cyril formed part of the subject matter of the Three Chapters Controversy and were condemned posthumously at the Second Council of Constantinople (553). He is accorded the epithet "Blessed" in the Eastern Orthodox Church."""
