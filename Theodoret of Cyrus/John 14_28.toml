[[commentary]]
quote='''
Sometimes, therefore, I [Jesus] say that I am equal to the Father, and at other times I say that the Father is greater. I am not contradicting myself, but I am showing that I am God and a human being—God through the lofty words, and a human being through the humble ones. But if you want to know how the Father is greater than I, I was talking from the flesh, not from the person of the divinity.
'''
source_url=''
source_title="DIALOGUE 1.56"
uuid = "5c3bca78-0d44-4131-9116-021f9958e54a"
