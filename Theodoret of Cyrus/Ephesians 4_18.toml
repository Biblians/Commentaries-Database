[[commentary]]
quote='''
By "hardness of heart" he means a complete lack of remorse. When parts of the body are hardened, they feel no sensation, as though they were completely dead. This may happen to the heart.
'''
source_url='https://archive.org/details/patrologiaecurs46migngoog/page/n245/mode/2up'
source_title="Interpretation of the Epistle to the Ephesians 4.18"
uuid = "e9c59759-3bdc-4457-b9d3-8b75bbe0bf8e"
