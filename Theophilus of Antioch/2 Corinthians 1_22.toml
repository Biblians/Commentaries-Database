[[commentary]]
quote='''
Wherefore such men have necessarily lost the wisdom of God, and have not found the truth. If you please, then, study these things carefully, that you may have a compendium
'''
source_url='https://www.tertullian.org/fathers2/ANF-02/anf02-43.htm'
source_title="Theophilus to Autolycus, Book III, Chapter XXX"
uuid = "b8647c13-63ab-4075-930e-147932ae59c1"
