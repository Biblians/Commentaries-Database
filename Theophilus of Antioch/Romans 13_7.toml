[[commentary]]
quote='''
And it [the divine word] teaches us to render all things to all, "honour to whom honour, fear to whom fear, tribute to whom tribute; to owe no man anything, but to love all."
'''
source_url='https://www.tertullian.org/fathers2/ANF-02/anf02-43.htm'
source_title="Theophilus to Autolycus, Book III, Chapter XIV"
uuid = "604f869b-501a-4166-b149-2f8a5233690d"
