[[commentary]]
quote='''
He called the abstaining of the sacrifices "doctrines," from sexual immorality and from blood, and from what is strangled; which he sees as a condition for canonical life. For these order a temperate life and are fitting for rational people.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title="Commentary on Acts"
