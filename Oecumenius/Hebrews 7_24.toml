[[commentary]]
quote='''
"from continuing." in the priesthood, namely, "permanently." Lacking succession, forever, "Therefore." Since he always living. "always." Not only in this age, but also in the future. For this is what they want entirely and completely.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FPseudo-Oecumenian%2520Catena%2520on%2520Hebrews%2FTranslation-Litteral.html'
source_title="The Pseudo-Oecumenian Catena on Hebrews"
