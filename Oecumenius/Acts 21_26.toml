[[commentary]]
quote='''
And to do this in Jerusalem is attainable. Do this then here, so that it may be possible for you to do that abroad. Then he was persuaded by them, and he shaved himself and fulfilled all the Jewish rites. [AMMONIUS]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title="Commentary on Acts"
