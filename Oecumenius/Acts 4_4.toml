[[commentary]]
quote='''
"Five thousand." For this reason he was speaking beforehand, about the five thousand: "You give them something to eat." (Matt. 14:16, Mark 6:37, Luke 9:13) That is, you will first satisfy the five thousand with faith and then you yourselves afterwards.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title="Commentary on Acts"
uuid = "45f9dec9-deaf-418d-b4db-d27fae5ab152"

[[commentary]]
quote='''
But the opposite happened. For many of those who heard the message believed. Do you see a visible divine operation? And indeed even those who had already believed became weaker. But Peter's speech, being formed by the divine Spirit, touched their very souls.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title="Commentary on Acts"
uuid = "e3421f71-8dfe-4ba5-9497-07f39cdf3c5a"
