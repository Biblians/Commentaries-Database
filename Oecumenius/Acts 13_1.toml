[[commentary]]
quote='''
Behold the character of each one, and not the upbringing from childhood saves. For see what company Manaen kept, who was esteemed a companion of prophecy. [AMMONIUS]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title="Commentary on Acts"
