[[commentary]]
quote='''
And this Ananias was a deacon, as Paul himself testifies in the canons. This happened because there was no elder present in Damascus on account of the persecution. [AMMONIUS]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title="Commentary on Acts"
