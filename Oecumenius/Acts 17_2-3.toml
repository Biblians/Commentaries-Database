[[commentary]]
quote='''
Since these men opposed the miracles, alleging that Paul and Silas were like deceivers and tricksters, he here appeals to the Scriptures to persuade them that no such suspicion could be held. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title="Commentary on Acts"
