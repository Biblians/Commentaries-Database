[[commentary]]
quote='''
As a learned man he silenced them and would not let them speak, but proved from the Scriptures. That is, reconciling, teaching with gentleness that Jesus is the Christ, the Son of God. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title="Commentary on Acts"
