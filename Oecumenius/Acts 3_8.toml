[[commentary]]
quote='''
"Walking and leaping." As if he were by now almost entirely unknown, who a little before had been so slow that he needed the help of others to move around.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title="Commentary on Acts"
