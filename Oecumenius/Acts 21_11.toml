[[commentary]]
quote='''
But the troubling thing is that they will hand him over into the hands of Gentiles. And Agabus did not say that they would bind Paul, so as not to seem to speak from an agreement; but "the man whose belt this is."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title="Commentary on Acts"
uuid = "1d1282ea-7a3e-44d4-8edf-4cbd6aafb5df"
