[[commentary]]
quote='''
Those who passed by wagged their heads, mocking the crucified, fulfilling the Scripture: "When they see me, they shake their heads."
'''
source_url='https://www.newadvent.org/fathers/310113.htm'
source_title="Catechetical Lecture 13:30"
uuid = "0789a77e-6bda-4b3e-9c6a-99be2af909d5"
