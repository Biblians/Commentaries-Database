[[commentary]]
quote='''
This sheep is equally called shepherd and says "I am the good Shepherd." By his manhood he is sheep; by his divine loving-kindness he is shepherd.
'''
source_url='https://www.newadvent.org/fathers/310110.htm'
source_title="Catechetical Lecture 10:3"
uuid = "8fd54888-b50b-41a9-8221-05f5c35ab71a"
