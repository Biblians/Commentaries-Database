summary = "Apollinaris the Younger, also known as Apollinaris of Laodicea and Apollinarius, was a bishop of Laodicea in Syria. He is best known as a noted opponent of Arianism. Apollinaris's eagerness to emphasize the deity of Jesus and the unity of his person led him to deny the existence of a rational human soul in Christ's human nature. This view came to be called Apollinarism. It was condemned by the First Council of Constantinople in 381."
