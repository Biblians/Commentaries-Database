[[commentary]]
quote='''
...from whom those who believe God and follow His word receive that salvation which flows from Him. Those, on the other hand, who depart from Him, and despise His precepts, and by their deeds bring dishonour on Him who made them, and by their opinions blaspheme Him who nourishes them, heap up against themselves most righteous judgment.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Irenaeus Against Heresies Book 4"
uuid = "88dee8d6-dd53-44d1-96a7-8a969b01a3ed"
