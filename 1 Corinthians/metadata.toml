summary = "The First Epistle to the Corinthians is one of the Pauline epistles, part of the New Testament of the Christian Bible. The epistle is attributed to Paul the Apostle and a co-author, Sosthenes, and is addressed to the Christian church in Corinth. Scholars believe that Sosthenes was the amanuensis who wrote down the text of the letter at Paul's direction. It addresses various issues which had arisen in the Christian community at Corinth and is composed in a form of Koine Greek. Despite the name, it is not believed to be the first such letter written to the Corinthian church."
