summary = "Ammonas of Egypt was an eastern Christian anchorite, monastic, and Desert Father who was born around the early 4th century. He is a saint in the Eastern Orthodox Church. Ammonas was a disciple of Anthony the Great and Pambo. Many of his known sayings and quotations exist in eleven sections of the Sayings of the Desert Fathers."
