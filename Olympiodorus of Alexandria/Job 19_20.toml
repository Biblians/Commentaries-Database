[[commentary]]
quote='''
"My flesh is corrupt under my skin, and my teeth grip my bones." "While I am alive," Job says, "my flesh putrefies, and my bones are chewed by the teeth of some wild animal."
'''
source_url=''
source_title="COMMENTARY ON JOB 19:20-22"
