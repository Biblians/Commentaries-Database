[[commentary]]
quote='''
"He stretches out the north wind upon nothing, and he upon nothing hangs the earth." Indeed the support of the earth is nothing but an understructure, but it is suspended and is sustained by divine will.
'''
source_url=''
source_title="COMMENTARY ON JOB 26:7-9"
uuid = "2cd4ddb1-a259-4eac-95da-e43c9a4d4701"
