summary = "Nemesius of Emesa was a Christian philosopher, and the author of a treatise Περὶ φύσεως ἀνθρώπου or De natura hominis. According to the title of his book, he was the bishop of Emesa. His book is an attempt to compile a system of anthropology from the standpoint of Christian philosophy; it was very influential in later Greek, Arabic and Christian thought."
