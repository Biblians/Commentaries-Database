[[commentary]]
quote='''
For faithful is he who has promised that "a thousand shall be chased by one," and that "ten thousand shall be put to flight by two," victory in battle being due not to numbers but to righteousness.
'''
source_url=''
source_title="ANSWER TO EUNOMIUS'S SECOND BOOK"
uuid = "c284d7d5-bdfb-4b14-8d19-cc467d7a2281"
