[[commentary]]
quote='''
For their benefit, he rebuked the disciples and gently restrained the sharpness of their wrath, not permitting them to grumble violently against those who sinned. He rather persuaded them to be patient and to cherish a mind that is unmovable by anything like this.
'''
source_url=''
source_title="COMMENTARY ON LUKE, HOMILY 56"
uuid = "0ec99daa-d94e-4de4-a370-6e4528dd42f6"


[[commentary]]
quote='''
Christ rebuked them for their own good when they were enraged beyond measure at the hatred of the Samaritans. He did this so they might learn that as ministers of the divine tidings, they must rather be full of longsuffering and gentleness, not revengeful. They must not be given to wrath or savagely attack those who offend them.
'''
source_url=''
source_title="COMMENTARY ON LUKE, HOMILY 56"
uuid = "4c1444e5-96c5-4b64-b90f-c2ecc357515c"
