[[commentary]]
quote='''
The church forged from the Gentiles says this: "Go forth and see." But what it calls the day of his wedding is the day of his passion, when he married the church by his blood.
'''
source_url=''
source_title="FRAGMENTS IN THE COMMENTARY ON THE SONG OF SONGS 3:11"
uuid = "78bef5e5-27fd-42ce-94a6-d4bfd94a23f7"
