[[commentary]]
quote='''
Women also are ever prone to tears, and have hearts easily disposed to pity.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title="Catena Aurea by Aquinas"
uuid = "bcd7b2ef-d66c-4100-929f-a4507b86828b"


[[commentary]]
quote='''
He was going to the place of crucifixion. Weeping women, as well as many others, followed him. The female sex tends to weep often. They have a disposition that is ready to sink at the approach of anything that is sorrowful.
'''
source_url=''
source_title="COMMENTARY ON LUKE, HOMILY 152"
uuid = "12eb12b1-ead9-4570-aaac-07a262d60bbe"
