summary = "Richard of Saint Victor was a Medieval Scottish philosopher and theologian and one of the most influential religious thinkers of his time. A canon regular, he was a prominent mystical theologian, and was prior of the famous Augustinian Abbey of Saint Victor in Paris from 1162 until his death in 1173."
