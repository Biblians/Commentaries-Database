summary = "Cosmas of Maiuma, also called Cosmas Hagiopolites, Cosmas of Jerusalem, Cosmas the Melodist, or Cosmas the Poet, was a bishop and an important hymnographer in the East. He is venerated as a saint by the Eastern Orthodox Church and the Catholic Church."
