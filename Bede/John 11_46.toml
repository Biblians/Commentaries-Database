[[commentary]]
quote='''
By those who went and told the Pharisees, are meant those who seeing the good works of God's servants, hate them on that very account, persecute, and calumniate them.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title="Catena Aurea by Aquinas"
