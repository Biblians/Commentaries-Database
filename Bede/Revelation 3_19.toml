[[commentary]]
quote='''
Those whom I love, I rebuke and chasten. Do not refuse to suffer adversities, since this is a special sign of being loved by the Lord.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Revelation.html"
source_title="Commentary on Revelation"
uuid = "0a303ce4-9cf4-4a85-9dd2-83a220cb7a2f"


[[commentary]]
quote='''
Be zealous therefore, and repent. He shows that there were those there who should have been emulated and followed.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Revelation.html"
source_title="Commentary on Revelation"
uuid = "9f76945b-8b62-4064-864b-417a6b174a35"
