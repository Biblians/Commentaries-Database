[[commentary]]
quote='''
And there was in their synagogue a man with an unclean spirit, etc. This is not a confession of the will, which follows the reward of confessing, but an extortion of necessity, which compels the guilty to confess. And just as if runaway slaves, after a long time, see their master, they fear nothing but whips, so also the demons, seeing the Lord suddenly dwelling on earth, believed that he had come to judge them. The presence of the Savior is torment for demons.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Mark.html"
source_title="On the Gospel of Mark"
uuid = "a5df812c-2e63-4a9e-a453-4bcd2eb7c936"


[[commentary]]
quote='''
(in Marc. i. 7) Since by the envy of the devil death first entered into the world, it was right that the medicine of healing should first work against the author of death; and therefore it is said, And there was in their synagogue a man, &c.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25201.html'
source_title="Catena Aurea by Aquinas"
uuid = "09cfc8f6-f01d-4293-8ac9-e267badec063"


[[commentary]]
quote='''
(ubi sup.) For the devils, seeing the Lord on the earth, thought that they were immediately to be judged.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25201.html'
source_title="Catena Aurea by Aquinas"
uuid = "2b31981c-1bdd-4aa1-959b-446bc41e7558"
