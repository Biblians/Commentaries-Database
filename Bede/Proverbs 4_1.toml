[[commentary]]
quote='''
Listen, my sons, to the discipline of a father, etc. Here, about to exhort to philosophy, he explains how he himself was taught wisdom by his father.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Proverbs.html"
source_title="Commentary on Proverbs"
