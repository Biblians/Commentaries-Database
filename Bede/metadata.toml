summary = 'Bede, also known as the Venerable Bede or Bede the Venerable, was an English monk, author and scholar. He was one of the best known writers during the Early Middle Ages, and his most famous work, Ecclesiastical History of the English People, gained him the title "The Father of English History". He served at the monastery of St Peter and its companion monastery of St Paul in the Kingdom of Northumbria of the Angles.'
