[[commentary]]
quote='''
Therefore, I will have him corrected and release him. I will scourge him and mock him as much as you demand, as long as you do not thirst for innocent blood.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Luke.html"
source_title="On the Gospel of Luke"
uuid = "8d57d057-22d1-4edd-bb6b-b7ffca1631c8"
