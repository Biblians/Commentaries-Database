[[commentary]]
quote='''
Brother will betray brother to death, and a father his child; and children will rise against parents and have them put to death. And you will be hated by all because of my name. But, etc. We have often seen this happen in persecutions, and there is no loyal affection among those who have different faiths.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Mark.html"
source_title="On the Gospel of Mark"
uuid = "d019479e-f1c6-44cc-941b-d446d3ae591c"

[[commentary]]
quote='''
(ubi sup.) This has often been seen in time of persecution, nor can there be any firm affection amongst men who differ in faith.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title="Catena Aurea by Aquinas"
uuid = "9865c2bc-baa0-413d-a3bb-80df9cdeb92a"
