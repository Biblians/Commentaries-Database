[[commentary]]
quote='''
Go, behold I send you as lambs among wolves. He calls the wolves the scribes and Pharisees, who are the clergy of the Jews.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Luke.html"
source_title="On the Gospel of Luke"
uuid = "d5b662e5-2a0e-43e3-91bb-fd74dd58a379"
