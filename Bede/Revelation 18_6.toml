[[commentary]]
quote='''
Repay her as she has repaid you. For visible and invisible plagues come forth from the Church into the world.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Revelation.html"
source_title="Commentary on Revelation"
uuid = "24884809-f0e6-4736-b9c7-973ff0a65b4d"


[[commentary]]
quote='''
And repay her double according to her works. So that she who enjoyed temporal pleasures may be tormented with eternal pains.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Revelation.html"
source_title="Commentary on Revelation"
uuid = "5624ce05-a83e-4604-9fcb-ae0a35872e33"
