[[commentary]]
quote='''
"If your enemy is hungry, feed him," etc. This can be understood both of physical food and spiritual nourishment.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Proverbs.html"
