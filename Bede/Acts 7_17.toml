[[commentary]]
quote='''
But when the time of the promise which God had confessed to Abraham was drawing near, namely that which was said: And after these things, they will go out and serve me in this place.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Acts.html"
source_title="Commentary on Acts"
uuid = "473fa441-553a-4e01-b789-53b2fbdee40e"


[[commentary]]
quote='''
But when the time of the promise which God had confessed to Abraham approached, it is better written in Greek: Which God had promised to Abraham.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FRetractions%2520on%2520Acts.html"
source_title="Retractions on Acts"
uuid = "ca82bc81-320c-41f1-8e63-c1d8b54e16ae"
