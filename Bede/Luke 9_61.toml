[[commentary]]
quote='''
And another said: I will follow you, Lord, but first allow me to say farewell to those who are at home. If a disciple of the Lord, because he wishes to say this farewell at home, is reproved, what will happen to those who, with no purpose of usefulness or of building faith, often do not fear to revisit the homes of those relatives they left in the world?
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Luke.html"
source_title="On the Gospel of Luke"
uuid = "3dab84f6-16c4-4dc5-baae-14aea54c2b60"

[[commentary]]
quote='''
But if the disciple about to follow our Lord is reproved for wishing even to bid farewell at home, what will be done to such as for no advantage-sake frequently visit the houses of those whom they have left in the world?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title="Catena Aurea by Aquinas"
uuid = "6712afe3-0b54-4b03-9afa-c6f239f24588"
