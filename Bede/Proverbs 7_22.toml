[[commentary]]
quote='''
Immediately he follows her, etc. That is, as if a foolish person, not knowing, he himself is led to destruction.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Proverbs.html"
