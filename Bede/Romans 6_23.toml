[[commentary]]
quote='''
Eternal life is unjustly given for good merits. Rather, merit is first given freely by a benevolent Savior.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bede%2FHomilies%2520on%2520the%2520Gospels.html'
source_title="Homilies on the Gospels 1.2"
