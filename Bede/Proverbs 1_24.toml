[[commentary]]
quote='''
Because I called, and you refused. Saying: Come to me, all you who labor and are burdened, and I will refresh you (Matthew XI).
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Proverbs.html"
source_title="Commentary on Proverbs"
uuid = "1bb88bcb-285e-4b7a-921d-deae15495860"


[[commentary]]
quote='''
I extended my hand, etc. First by doing good and healing all oppressed by the devil, later by suffering on the cross.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Proverbs.html"
source_title="Commentary on Proverbs"
uuid = "6d8647ae-10de-4b84-91c7-9996d0e005fb"
