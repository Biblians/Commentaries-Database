[[commentary]]
quote='''
A Typhonic wind sent itself against them. Another Latin translation says: A tempestuous wind. For Typhus in Greek is called inflation in Latin.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Acts.html"
source_title="Commentary on Acts"
