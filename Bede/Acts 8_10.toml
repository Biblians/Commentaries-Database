[[commentary]]
quote='''
All listened to him from the least to the greatest, saying: This man is the power of God. This, not as an adverb of place, but as a pronoun. As if to say: This one is the power of God.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FRetractions%2520on%2520Acts.html"
source_title="Retractions on Acts"
uuid = "79f356ce-e2a8-4ed2-9955-d4e8a8efae74"
