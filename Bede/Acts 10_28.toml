[[commentary]]
quote='''
And God showed me that no man should be called common or unclean. He undoubtedly showed this when the angelic voice sounded: What God has purified, do not call common.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Acts.html"
source_title="Commentary on Acts"
uuid = "ca3d103e-07b4-4511-8084-a02e8eebe4e5"
