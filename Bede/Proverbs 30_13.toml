[[commentary]]
quote='''
A generation whose eyes are lofty, etc. As the Psalmist says: Lord, my heart is not exalted, etc. (Psalm CXXX).
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Proverbs.html"
