[[commentary]]
quote='''
It seemed good to the Holy Spirit and to us; that is, it pleased the Holy Spirit, who, being the arbiter of his own power, breathes where he wills and speaks what he wills.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Acts.html"
source_title="Commentary on Acts"
uuid = "49d9b11c-4cdb-4262-91ff-74f515354446"


[[commentary]]
quote='''
It has also seemed good to us; not by our will alone, but by the urging of the same Spirit.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Acts.html"
source_title="Commentary on Acts"
uuid = "55ad7049-d410-4c65-aa0e-62464f0d2081"


[[commentary]]
quote='''
For it seemed good to the Holy Spirit, and to us. In the Greek it is written: For it has pleased the Holy Spirit, and us.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FRetractions%2520on%2520Acts.html"
source_title="Retractions on Acts"
uuid = "27c7bb9b-7cd4-442d-a948-f62d7d97d172"
