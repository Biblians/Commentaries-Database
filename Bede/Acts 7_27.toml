[[commentary]]
quote='''
Who made you a ruler and judge over us? In his entire speech, he convicted them, already then being contrary to the law and Moses.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Acts.html"
source_title="Commentary on Acts"
