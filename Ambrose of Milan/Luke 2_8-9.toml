[[commentary]]
quote='''
Observe with what care God builds up our faith. An Angel teaches Mary; an Angel teaches Joseph; an Angel the shepherds also, of whom it is said, And there were in the same country shepherds abiding in the field.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title="Catena Aurea by Aquinas"
uuid = "aa7b82c5-ba22-4333-bcc4-d2ba26cafda1"

[[commentary]]
quote='''
See how divine providence strengthens faith: the angel instructs Mary, the angel instructs Joseph, the angel instructs the shepherds. It is not enough to send once; for every word stands on the testimony of two or three witnesses.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FCommentary%2520on%2520Luke.html'
source_title="EXPOSITION OF THE GOSPEL OF LUKE 2.51"
uuid = "22ea25c7-1e4a-4955-8f40-a9f1f30c079a"
