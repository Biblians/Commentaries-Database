summary = "Pope Fabian was the bishop of Rome and head of the Catholic Church from 10 January 236 until his death on 20 January 250, succeeding Anterus. A dove is said to have descended on his head to mark him as the Holy Spirit's unexpected choice to become the next pope. He was succeeded by Cornelius."
