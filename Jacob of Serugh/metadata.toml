summary = "Jacob of Serugh, also called Jacob of Sarug or Mar Jacob, was one of the foremost poets and theologians of the Syriac Christian tradition and authors of Syriac literature, second only to Ephrem the Syrian and equal to Narsai. He lived most of his life as an ecclesiastical official in Suruç, in modern-day Turkey. He became a bishop near the end of his life in 519. He was a Miaphysite, albeit moderate compared to his contemporaries."
