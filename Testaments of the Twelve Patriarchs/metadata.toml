summary = "The Testaments of the Twelve Patriarchs is a constituent of the apocryphal scriptures connected with the Bible. It is believed to be a pseudepigraphical work of the dying commands of the twelve sons of Jacob. It is part of the Oskan Armenian Orthodox Bible printed in 1666. Fragments of similar writings were found at Qumran, but opinions are divided as to whether these are the same texts. It is generally considered apocalyptic literature."
