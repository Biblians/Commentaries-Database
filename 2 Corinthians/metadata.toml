summary = "The Second Epistle to the Corinthians is a Pauline epistle of the New Testament of the Christian Bible. The epistle is attributed to Paul the Apostle and a co-author named Timothy, and is addressed to the church in Corinth and Christians in the surrounding province of Achaea, in modern-day Greece. According to Jerome, Titus was the amanuensis of this epistle."
