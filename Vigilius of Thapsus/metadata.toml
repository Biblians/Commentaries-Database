summary = "Vigilius of Thapsus also known as Vigilius Tapsensis, Vigilius Afer, or Vergil of Tapso, was a 5th-century Bishop of Thapsus in the province Byzacium, in what is now Tunisia, and as well as a theological writer and polemicist."
