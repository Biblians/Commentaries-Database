summary = "Severus of Antioch also known as Severus of Gaza and nicknamed the Crown of Syrians, was the Patriarch of Antioch and head of the Syriac Orthodox Church from 512 until his death in 538. He is venerated as a saint in the Oriental Orthodox Church, and his feast day is celebrated on 29 September by the Syriac Orthodox Church and 8 February by the Coptic Orthodox Church"
