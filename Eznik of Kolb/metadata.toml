summary = "Eznik of Kolb was an Armenian Christian writer of the 5th century. He was one of the students of Mesrop Mashtots, the inventor of the Armenian alphabet. His only surviving work is an untitled treatise which refutes various religious and philosophical ideas. Scholars refer to this work as Refutation of the Sects or On God. Travelling to Edessa and Constantinople, Eznik participated in the translation of the Bible and other Christian literature from Greek and Syriac into Armenian. He is believed to be identical with a bishop of Bagrevand named Eznik."
