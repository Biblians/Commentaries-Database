[[commentary]]
quote='''
But Jesus said: "if they keep silent, the stones will cry out." Or: the people say this not out of flattery toward Me, but they utter this doxology because they are convinced and compelled by all those signs and mighty works which they have seen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title="Commentary on Luke"
uuid = "51f30cdc-cb6d-41f6-b441-8633efefc2bb"

[[commentary]]
quote='''
As if He said, Not without cause do men praise me thus, but being constrained by the mighty works which they have seen.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title="Catena Aurea by Aquinas"
uuid = "1686229d-bc4f-4595-98df-3b72c15105ae"
