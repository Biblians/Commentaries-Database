[[commentary]]
quote='''
But others said of Christ that He was Elijah, because He rebuked many, for example when He said: "O faithless generation!"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title="Commentary on Mark"
uuid = "b5f4896c-12cf-4d54-98fe-8aff8e2aafff"

[[commentary]]
quote='''
For John confuted many men, when he said, Ye generation of vipers. It goes on, But others said, that it is a prophet, or as one of the prophets.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title="Catena Aurea by Aquinas"
uuid = "1cd84986-a2fc-44c1-b80a-5eaba2bf6389"
