[[commentary]]
quote='''
But when asked a second time, Christ answered nothing and thereby brought Pilate to amazement. For Pilate marveled that He, being learned in the law and eloquent and having the ability to overthrow with a single answer the slanders brought against Him, said nothing, but on the contrary, humbly endured the accusations.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title="Commentary on Mark"
uuid = "21e14607-ea7b-4b96-ba35-3769dba9f2a3"

[[commentary]]
quote='''
But Pilate wondered, because, though He was a teacher of the law, and eloquent, and able by His answer to destroy their accusations, He did not answer any thing, but rather bore their accusations courageously.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title="Catena Aurea by Aquinas"
uuid = "90704df7-55e0-456c-98cd-dea764691659"
