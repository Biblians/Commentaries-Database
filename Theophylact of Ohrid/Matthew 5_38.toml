[[commentary]]
quote='''
Ye have heard that it hath been said, An eye for an eye, and a tooth for a tooth. Condescending to human perversity, the law permitted retaliation so that men would not harm each other, out of fear of suffering the same themselves (Ex. 21:24).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"
