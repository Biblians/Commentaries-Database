[[commentary]]
quote='''
And in general, the tribulation will be the most grievous of all that have ever been or will be.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title="Commentary on Mark"
uuid = "0bb5e447-608e-4294-ba16-7271260f3d2e"

[[commentary]]
quote='''
And He fitly gives the cause for so great a necessity for flight; saying, For in those days shall be affliction, such as was not from the beginning of the creation which God created unto this time, neither shall be.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title="Catena Aurea by Aquinas"
uuid = "dc5c5573-0b19-40c6-b1ae-878fc5dae1fe"
