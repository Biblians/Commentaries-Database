[[commentary]]
quote='''
The Evangelist dwells on the narrative about Anna, listing her father and tribe, so that we may know that he speaks the truth, since he invites, as it were, many witnesses who know her father and tribe.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title="Commentary on Luke"
uuid = "a3037a5b-bf85-4d7a-8303-4649fbfe7561"

[[commentary]]
quote='''
The Evangelist dwells some time on the account of Anna, mentioning both her father's tribe, and adding, as it were, many witnesses who knew her father and her tribe.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title="Catena Aurea by Aquinas"
uuid = "c2c27212-76b7-4a46-9313-f858ad90cf8f"

[[commentary]]
quote='''
The Evangelist continues with this account of Anna. He lists both her father and her tribe, so that we might be convinced he is speaking the truth. He is summoning, as it were, many witnesses who knew her father and her tribe.
'''
source_url=''
source_title="THE EXPLANATION OF THE HOLY GOSPEL ACCORDING TO ST. LUKE 2"
uuid = "2e29ffc5-2179-4048-867f-f018fd30b94c"
