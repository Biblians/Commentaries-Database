[[commentary]]
quote='''
One was chosen and loved, and the other hated, so that everything might be the work of God and of His election and foreknowledge, and not from works, but from Him who calls.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25209.html'
source_title="Commentary on Romans"
