[[commentary]]
quote='''
Looking he saith, as if signifying by his looks his love and admiration for Christ.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title="Catena Aurea by Aquinas"
uuid = "c071d8bb-41f1-4195-9028-59e6a429580d"

[[commentary]]
quote='''
"Having seen," it says, "Jesus," that is, having before his eyes his joy about Jesus and the miracle, John said: "behold the Lamb."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title="Commentary on John"
uuid = "3caeb7c9-4fca-480c-b13b-c1650154e58a"
