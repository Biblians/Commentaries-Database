[[commentary]]
quote='''
At the same time He also foretells to them that which is worst of all, namely, that they will be persecuted even by their own household members. He says this so that, hearing about it in advance, they might prepare themselves for the trials and afterward be able to bear them easily.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title="Commentary on Mark"
uuid = "67730843-179d-4f6f-aa29-136bfa25fbf3"

[[commentary]]
quote='''
He also foretells to them a worse evil, that they should suffer persecution from their relations. Wherefore there follows: Now the brother shall betray the brother to death, and the father the son; and children shall rise up against their parents, and shall cause them to be put to death; and ye shall be hated of all men for my name's sake.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title="Catena Aurea by Aquinas"
uuid = "339e81d9-8964-454f-861b-e5e6c42017dc"
