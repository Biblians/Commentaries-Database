[[commentary]]
quote='''
"The father of Publius lay sick with a fever and dysentery." Dysentery, a disease difficult to cure, having been healed by Paul, converted many to faith in Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252028.html'
source_title="Commentary on Acts"
