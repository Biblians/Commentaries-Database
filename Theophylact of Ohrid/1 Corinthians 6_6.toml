[[commentary]]
quote='''
A twofold evil: one is that it is conducted against a brother, and the other is that it is conducted before unbelievers.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Corinthians%2FChapter%25206.html'
