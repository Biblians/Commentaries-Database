[[commentary]]
quote='''
Having cried out with a loud voice, Jesus gives up His spirit. For He had the power to lay down His life, and "to take it again" (John 10:18).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title="Commentary on Luke"
uuid = "40b0b531-541d-486d-b4bb-3240dfdcf321"

[[commentary]]
quote='''
But crying with a loud voice He gives up the ghost, because He had in Himself the power of laying down His life and taking it up again.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title="Catena Aurea by Aquinas"
uuid = "4e35bd91-ed08-4098-82c4-81dd6cde08f4"
