[[commentary]]
quote='''
But the Samaritan, although he was of a foreign race, returned and expressed his gratitude (for the Samaritans were Assyrians), so that none of the Gentiles would despair, and none of those descended from holy ancestors would boast of this.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252017.html'
source_title="Commentary on Luke"
uuid = "16abbd69-7aad-4c64-937a-e7d19394441f"

[[commentary]]
quote='''
We may gather from this that a man is not one whit hindered from pleasing God because he comes from a cursed race, only let him bear in his heart an honest purpose.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252017.html'
source_title="Catena Aurea by Aquinas"
uuid = "abced78e-6454-4b92-9234-f9678fe17ed3"
