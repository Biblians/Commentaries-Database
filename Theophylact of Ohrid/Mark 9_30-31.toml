[[commentary]]
quote='''
Everywhere Jesus joined the word about His suffering with miracles, so that they would not think that He suffered out of weakness. And now, having said the sorrowful word that "they will kill Him," He adds also the joyful one – that "on the third day He will rise," so that we may know that joy always follows after sorrows, and therefore so that we would not waste away in spirit needlessly in sorrows, but would hope to receive something joyful as well.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25209.html'
source_title="Commentary on Mark"
uuid = "b768d4c6-75d2-4b48-88af-2e4853630827"

[[commentary]]
quote='''
It is after miracles that the Lord inserts a discourse concerning His Passion, lest it should be thought that He suffered because He could not help it; wherefore it is said, And they departed thence, and passed through Galilee: and he would not that any man should know it. For he taught his disciples, and said unto them, The Son of man is delivered into the hands of men, and they shall kill him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25209.html'
source_title="Catena Aurea by Aquinas"
uuid = "ff72f0b0-cc3b-4196-af0d-489f25de09f4"
