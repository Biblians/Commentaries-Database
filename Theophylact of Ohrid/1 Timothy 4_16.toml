[[commentary]]
quote='''
That is, be attentive to yourself and teach others.

He who nourishes himself with the words of teaching first benefits himself, because in teaching others, he also moves himself to compunction.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Timothy%2FChapter%25204.html'
source_title="Commentary on 1 Timothy"
