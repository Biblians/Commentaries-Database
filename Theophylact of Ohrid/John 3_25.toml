[[commentary]]
quote='''
A dispute arose between John's disciples and a certain Jew concerning baptism. The Jew held the baptism of Christ's disciples to be superior, while John's disciples held the baptism of their teacher to be superior.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title="Commentary on John"
uuid = "f2984c02-15e1-43d0-8b11-c21134452c5d"
