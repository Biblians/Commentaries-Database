[[commentary]]
quote='''
See how powerful the passion of carnal love is! Here is Herod, who had so much respect and fear for John, yet disregarded this in order only to satisfy his passion.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title="Commentary on Mark"
uuid = "487f3484-69e8-4004-95f2-0a73604d5eb4"

[[commentary]]
quote='''
But see how great is the fury of lust, for though Herod had such an awe and fear of John, he forgets it all, that he may minister to his fornication.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title="Catena Aurea by Aquinas"
uuid = "278baae7-9daf-47ac-9cc7-335561d1e4ea"
