[[commentary]]
quote='''
But watch and pray, that you not fall into temptation and deny Me. Let your spirit be willing not to deny, as you also promised Me; but the flesh is weak, and therefore, if God does not give strength to your flesh in answer to your prayer, disaster will befall you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title="Commentary on Mark"
uuid = "3d972ab5-f6aa-4a05-b22b-6af1172b226d"

[[commentary]]
quote='''
As if He had said, Your spirit indeed is ready not to deny me, and for this reason ye promise; but your flesh is weak, in that unless God give power to your flesh through prayer, ye shall enter into temptation.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title="Catena Aurea by Aquinas"
uuid = "eaebae0c-d694-45c1-8572-35e6d28464e0"
