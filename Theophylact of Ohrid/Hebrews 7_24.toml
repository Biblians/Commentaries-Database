[[commentary]]
quote='''
"He has a priesthood that does not pass away," that is, one that is shared with no one and not transferable. Do you see how much higher it is? As much as the immortal is higher than the mortal.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Hebrews%2FChapter%25207.html'
source_title="Commentary on Hebrews"
