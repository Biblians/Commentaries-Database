[[commentary]]
quote='''
Disciples, prepared by constant testimony, followed after Jesus not out of contempt for John, but most of all out of obedience to him, as he testified about Christ in the best way.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title="Commentary on John"
