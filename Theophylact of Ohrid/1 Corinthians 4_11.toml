[[commentary]]
quote='''
What, he says, is the point of recalling the past? Look at what is now — at how you are drowning in pleasures, while we are quite the opposite.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Corinthians%2FChapter%25204.html'
source_title="Commentary on 1 Corinthians"
uuid = "5e7d69f8-b4c2-41c0-ac02-328f09b8d5ba"

[[commentary]]
quote='''
That is, we are beaten. He says this against the arrogant.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Corinthians%2FChapter%25204.html'
source_title="Commentary on 1 Corinthians"
uuid = "6cfc5e54-5ff3-4a05-8fea-424e252d291d"

[[commentary]]
quote='''
That is, they persecute us; we flee. This is against the rich.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Corinthians%2FChapter%25204.html'
source_title="Commentary on 1 Corinthians"
uuid = "2b553075-4f4c-4e04-8972-1717cbdf708b"
