[[commentary]]
quote='''
And "keep" yourselves in the love of God, that is, preserve yourselves, awaiting mercy from the Lord, Who on the last day will grant you eternal life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Jude%2FJude.html'
source_title="Commentary on Jude"
