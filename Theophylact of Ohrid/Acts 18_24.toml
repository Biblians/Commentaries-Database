[[commentary]]
quote='''
Some assert that this "Apollos" is Apollos, Bishop of Corinth, about whom Paul writes: "As for brother Apollos, I strongly urged him" (1 Cor. 16:12); also: "I planted, Apollos watered, but God gave the growth" (1 Cor. 3:6).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252018.html'
source_title="Commentary on Acts"
uuid = "c3c5cb4a-1138-493f-bf88-8d3f329b0b42"
