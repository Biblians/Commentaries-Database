[[commentary]]
quote='''
The connection is as follows: grace and peace be multiplied to you, who, in the knowledge of God and of Christ Jesus our Lord, have received a faith equally precious with ours, according to the righteousness of our God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Peter%2FChapter%25201.html'
source_title="Commentary on 2 Peter"
uuid = "ea320e4a-2a64-4740-8407-a700faea6cec"
