[[commentary]]
quote='''
Note the Lord's commandment: "preach to every creature." He did not say: preach only to the obedient, but to every creature, whether they will listen or not.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252016.html'
source_title="Commentary on Mark"
uuid = "2435906e-d6a1-4162-9af9-8129d661b493"

[[commentary]]
quote='''
Or else; to every creature, that is, whether believing or unbelieving.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252016.html'
source_title="Catena Aurea by Aquinas"
uuid = "fed9ca88-2e9a-4c0e-b470-320f2de53f9b"
