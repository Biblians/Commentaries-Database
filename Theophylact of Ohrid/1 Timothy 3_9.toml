[[commentary]]
quote='''
That is, with the keeping of the right dogma, having also a blameless life. For a pure conscience comes with a blameless life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Timothy%2FChapter%25203.html'
source_title="Commentary on 1 Timothy"
