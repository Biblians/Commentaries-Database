[[commentary]]
quote='''
And that three times he confessed that the animals there were unclean. And the fact that the vessel descended from heaven and ascended back there — this is a great proof of purity. So this is accomplished for those to whom it is to be told.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252010.html'
source_title="Commentary on Acts"
