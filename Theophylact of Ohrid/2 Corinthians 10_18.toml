[[commentary]]
quote='''
He did not say: we are skillful, but: "whom the Lord commends," that is, the one whom the reality of labor and endeavor, by the grace of God, has shown to be worthy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Corinthians%2FChapter%252010.html'
source_title="Commentary on 2 Corinthians"
