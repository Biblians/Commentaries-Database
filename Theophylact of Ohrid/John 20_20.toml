[[commentary]]
quote='''
The disciples were glad when they saw the Lord. And about this He also foretold them before the Passion: "I will see you again, and your heart shall rejoice" (Jn. 16:22).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252020.html'
source_title="Commentary on John"
