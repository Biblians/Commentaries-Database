[[commentary]]
quote='''
The Lord speaks generally about all prophets, that they receive no honor in their homelands, among their kinsmen and household members. Do they have distinguished kinsmen? In that case, those kinsmen envy them and therefore dishonor them. Are they of humble origin? Again, they are disgraced for their humble origin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title="Commentary on Mark"
uuid = "6dca3bb7-3df4-49e9-a9d4-d1a94e08cc83"

[[commentary]]
quote='''
Or again, if the prophet has noble relations, his countrymen hate them, and on that account do not honour the prophet.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title="Catena Aurea by Aquinas"
uuid = "197a82a3-4c87-430a-89ee-f899c01fb51e"
