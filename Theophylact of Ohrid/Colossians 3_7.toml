[[commentary]]
quote='''
This word is not without praise, because now they no longer live in lusts; but there was a time when they did live so, for they were pagans.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Colossians%2FChapter%25203.html'
source_title="Commentary on Colossians"
