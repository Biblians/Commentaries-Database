[[commentary]]
quote='''
He made a greeting in his own hand, in order to show that he attaches great importance to the epistle.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Corinthians%2FChapter%252016.html'
