[[commentary]]
quote='''
No kind of subtlety, he says, remained which you did not possess. He rightly said "all subtlety," because the sorcerer was a flatterer and a liar. And he calls him "son of the devil" because he was doing the devil's work.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title="Commentary on Acts"
