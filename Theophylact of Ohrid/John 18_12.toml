[[commentary]]
quote='''
Every thing having been done that could be to dissuade the Jews, and they refusing to take warning, He suffered Himself to be delivered into their hands: Then the band and the captain and officers of the Jews took Jesus.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title="Catena Aurea by Aquinas"
uuid = "adce25b9-bc95-4e56-9ce3-fc36e115008d"

[[commentary]]
quote='''
When the Lord had done everything that could have subdued them, and they did not understand, then He allowed them to lead Him away.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title="Commentary on John"
uuid = "e2d16027-97d6-4fec-ac57-5b37ef9f7cc3"
