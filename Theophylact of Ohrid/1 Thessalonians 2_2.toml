[[commentary]]
quote='''
Having escaped dangers in Philippi, we again fell into other dangers among you. See how once more he ascribes everything to God, having said: "we were bold in our God," that is, emboldened by Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Thessalonians%2FChapter%25202.html'
source_title="Commentary on 1 Thessalonians"
uuid = "0494406d-5cf5-42f9-bf64-25ebca2d1692"
