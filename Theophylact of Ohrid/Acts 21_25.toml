[[commentary]]
quote='''
As we give instructions to the Gentiles, although we preach to the Jews, so also you cooperate with us, although you preach to the Gentiles. Do not be afraid, it is a matter of condescension.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252021.html'
source_title="Commentary on Acts"
