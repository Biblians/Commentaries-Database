[[commentary]]
quote='''
The disciples began to grieve when the Lord said: "one of you will betray Me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title="Commentary on Mark"
uuid = "03c1450f-bc45-43be-bb89-67794fa11e46"

[[commentary]]
quote='''
But how could they eat reclining, when the law ordered that standing and upright they should eat the Passover? It is probable that they had first fulfilled the legal Passover, and had reclined, when He began to give them His own Passover.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title="Catena Aurea by Aquinas"
uuid = "3ae3a4e5-4042-40be-baa6-67f2c2281c40"
