[[commentary]]
quote='''
This is that Simeon who in the Gospel of Luke prophesies: "Now You are dismissing Your servant, O Master" (Luke 2:29). The Lord was pleased to receive people from the Gentiles not simply, but "for His name," that is, for the sake of His glory.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252015.html'
source_title="Commentary on Acts"
