[[commentary]]
quote='''
And do you wish to receive what you ask in yet another way? Forgive your brother if he has sinned in anything against you. See how easy it is to receive the gift of God!
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252011.html'
source_title="Commentary on Mark"
uuid = "465d929b-07d4-4a05-9937-b5c3a64e8c58"

[[commentary]]
quote='''
Again, would you in another way receive what you ask for? Forgive your brother, if he has in any way sinned against you; this is also what is added: And when ye stand praying, forgive, if ye have ought against any: that your Father also which is in heaven may forgive you your trespasses.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252011.html'
source_title="Catena Aurea by Aquinas"
uuid = "0216999c-cdbf-4709-b978-e5161ab9f560"
