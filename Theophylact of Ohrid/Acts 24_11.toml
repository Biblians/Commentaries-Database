[[commentary]]
quote='''
So far, says Paul, am I from stirring up disturbances, that I came to Jerusalem to worship. He dwells on this point because it presented a strong proof of his innocence.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252024.html'
source_title="Commentary on Acts"
