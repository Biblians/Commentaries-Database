[[commentary]]
quote='''
The Lord asks the demoniac not in order to know Himself, but so that others might know about the multitude of demons that had entered him. Since before their eyes stood one man, Christ shows how many enemies this wretched man was fighting against.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title="Commentary on Mark"
uuid = "76353061-5a5f-4ae5-8f4e-98d6ae57ea13"

[[commentary]]
quote='''
The Lord indeed asks, not that He Himself required to know, but that the rest might know that there was a multitude of devils dwelling in him. Also that by fighting with us, they may make us more expert.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title="Catena Aurea by Aquinas"
uuid = "82e7015f-3f87-4b03-a559-589d689f27ff"
