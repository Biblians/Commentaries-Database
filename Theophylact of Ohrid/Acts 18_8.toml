[[commentary]]
quote='''
"Crispus… the ruler of the synagogue, believed in the Lord." This is the same Crispus of whom Paul says: "I baptized none of you except Crispus and Gaius" (1 Cor. 1:14).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252018.html'
source_title="Commentary on Acts"
