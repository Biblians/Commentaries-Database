[[commentary]]
quote='''
He called His Blood the Blood of the "New Testament," in distinction from the Old Testament, for the Old Testament also had blood, with which both the people and the books of the Law were sprinkled.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title="Commentary on Mark"
