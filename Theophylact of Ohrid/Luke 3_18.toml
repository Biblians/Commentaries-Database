[[commentary]]
quote='''
Good teaching is truly consolation and is rightly called the Gospel.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%25203.html'
source_title="Commentary on Luke"
uuid = "d49f2971-188e-4eab-9448-93eca829820d"

[[commentary]]
quote='''
For his exhortation was the telling of good things, and therefore is fitly called the Gospel.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25203.html'
source_title="Catena Aurea by Aquinas"
uuid = "5024fdda-0850-40fe-8f26-a2a9f1a95ebd"
