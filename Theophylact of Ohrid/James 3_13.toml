[[commentary]]
quote='''
Having finished his discourse on the recklessness and unruliness of the tongue, the apostle turns his speech to "envy," which is born in people from similar thoughtlessness. He said this, having first praised the good teacher.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520James%2FChapter%25203.html'
source_title="Commentary on James"
