[[commentary]]
quote='''
In the words "and when the Chief Shepherd appears," the conjunction "and" is put in place of "so that," that is, so that when the Chief Shepherd appears, you may receive the crown of incorruption.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Peter%2FChapter%25205.html'
source_title="Commentary on 1 Peter"
