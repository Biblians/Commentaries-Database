[[commentary]]
quote='''
Paul says "indeed, I too thought," for it seemed to him that this is how it should have been.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252026.html'
source_title="Commentary on Acts"
