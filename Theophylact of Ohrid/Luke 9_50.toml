[[commentary]]
quote='''
Marvel then at the power of Christ, how His grace works by means of the unworthy and those who are not His disciples: as also men are sanctified through the priests, although the priests be not holy.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title="Catena Aurea by Aquinas"
