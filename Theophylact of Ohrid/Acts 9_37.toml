[[commentary]]
quote='''
"It happened in those days that she fell ill and died. They washed her and laid her in an upper room." That is, they did everything that was proper to do for the deceased.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25209.html'
source_title="Commentary on Acts"
