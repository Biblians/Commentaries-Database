[[commentary]]
quote='''
But the Lord encourages the father and says: "only believe."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title="Commentary on Mark"
uuid = "5fee17dd-939f-458f-b63d-64cd0980a2ad"

[[commentary]]
quote='''
But the Lord Himself persuades the father to have confidence. For it goes on, As soon as Jesus heard the word which was spoken, he saith to the ruler of the synagogue, Be not afraid; only believe.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title="Catena Aurea by Aquinas"
uuid = "7e4b063d-06aa-416f-aff3-3a1925f44b09"
