[[commentary]]
quote='''
Further, He gives the names of the Apostles, that the true Apostles might be known, so that men might avoid the false. And therefore it continues: And Simon he surnamed Cephas.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title="Catena Aurea by Aquinas"
uuid = "a9335721-7282-414e-b4c5-4d51f5fb7401"

[[commentary]]
quote='''
The Evangelist lists the names of the apostles on account of the false apostles, so that the true apostles might be known.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title="Commentary on Mark"
uuid = "bf84a6d0-8a39-4035-a486-b7c3b7176204"
