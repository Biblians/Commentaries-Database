[[commentary]]
quote='''
The Pharisees grumbled that the people called Jesus King and praised Him as God; for (in their opinion) the solemn ascription to Him of the name of King was a sign of sedition and blasphemy against the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title="Commentary on Luke"
uuid = "765a4ba3-ef18-44d1-8e5b-e283efdc1362"

[[commentary]]
quote='''
But the Pharisees when they heard that the crowd called Him King, and praised Him as God, murmured, imputing the name of King to sedition, the name of God to blasphemy. And some of the Pharisees said, Master, rebuke thy disciples.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title="Catena Aurea by Aquinas"
uuid = "1c295d7f-778a-4743-882f-64f4ff3a4706"
