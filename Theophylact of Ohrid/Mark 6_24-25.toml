[[commentary]]
quote='''
"That you give me," says the wicked woman, "right now," at once.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title="Commentary on Mark"
uuid = "70a9dd9e-9f6e-4265-9c75-3deac4f1b18b"

[[commentary]]
quote='''
The malignant woman begs that the head of John be given to her immediately, that is, at once, in that very hour, for she feared lest Herod should repent.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title="Catena Aurea by Aquinas"
uuid = "b6d10d49-d04e-401f-8efe-99850f776528"
