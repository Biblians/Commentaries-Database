[[commentary]]
quote='''
When in this manner the chief priests unanimously condemned Him (Christ), then the servants, having covered Him, began to beat Him and say, "Prophesy!" — who struck You? If our Lord endured so much for us, then how much must we endure for His sake, in order to repay the Master in equal measure? Oh, this is fearful!
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title="Commentary on Mark"
uuid = "d03ee80c-3e6f-4bef-86cd-17aeb620ed31"

[[commentary]]
quote='''
The Jewish priesthood was to be rent from the time that they condemned Christ as guilty of death; wherefore there follows, And they all condemned him to be guilty of death.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title="Catena Aurea by Aquinas"
uuid = "534e2fa4-17b6-451e-88e5-bb66d3837a84"
