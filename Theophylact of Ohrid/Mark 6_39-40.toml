[[commentary]]
quote='''
Finally, the Lord has them all recline on the grass in separate groups—that is, as if at different tables.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title="Commentary on Mark"
uuid = "d02343d8-b6ff-4443-8aef-d6a6ea03199a"

[[commentary]]
quote='''
We are given to understand that they lay down in parties, separate from one another, for what is translated by companies, is repeated twice over in the Greek, as though it were by companies and companies.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title="Catena Aurea by Aquinas"
uuid = "9ec79efa-f9de-4e67-acbf-12afe4c27104"
