[[commentary]]
quote='''
For His wish is not that we should usurp for ourselves chief places, but that we should attain to lofty heights by lowliness.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25209.html'
source_title="Catena Aurea by Aquinas"
uuid = "09f93600-e0d7-4070-863d-fed14176b8b7"

[[commentary]]
quote='''
But the Lord, although He does not forbid the aspiration toward greater honor (for He commands us to desire the higher degrees), nevertheless does not permit us to seize primacy from others; on the contrary, He wants us to attain exaltation through humility.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25209.html'
source_title="Commentary on Mark"
uuid = "45d75d9c-23b6-4388-ad4e-6aa822d4af80"
