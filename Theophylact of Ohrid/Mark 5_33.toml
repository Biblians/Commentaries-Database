[[commentary]]
quote='''
But why does the Lord reveal the woman? First, in order to glorify the woman's faith; second, in order to arouse faith in the ruler of the synagogue that his daughter also will be saved; and also in order to free the woman from her great fear, for she was afraid as one who had stolen a healing. Thus the Evangelist also says: "she came in fear and trembling."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title="Commentary on Mark"
uuid = "f6ab1685-25d3-45bd-a9b5-d80d87fe4dbd"

[[commentary]]
quote='''
For the woman feared because she had stolen health; wherefore there follows, But the woman, fearing and trembling, &c.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title="Catena Aurea by Aquinas"
uuid = "de2590a8-18fd-43f2-962e-299c3ff2c8fd"
