[[commentary]]
quote='''
On account of this passion, having heard the Lord's words, "Go, sell... and give to the poor," he "went away sorrowful." Note here that the Lord did not say: sell what you have bit by bit and give it away, but sell it all at once and give it away, and only to the poor, not to flatterers and not to the debauched; then: "follow Me," that is, adopt every other virtue as well, for there are many who, though not covetous, are not humble, or though humble, are not sober, or have some other vice. Therefore the Lord does not say merely "sell and give to the poor," but "come, follow Me, taking up the cross," which means to be ready to die for His sake.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title="Commentary on Mark"
uuid = "a2b5fcb9-c4e7-4eee-9b10-6267eff9155b"

[[commentary]]
quote='''
And when he has sold it, to give it to the poor, not to stage-players and luxurious persons.

But because there are many poor who are not humble, but are drunkards or have some other vice, for this reason He says, And come, follow me.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title="Catena Aurea by Aquinas"
