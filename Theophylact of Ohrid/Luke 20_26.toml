[[commentary]]
quote='''
The Pharisees could not catch Jesus in His word before the people. For their special concern was to slander Him before the people as one who was enslaving the nation to the Romans. But this they could not achieve because of His most wise answer.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title="Commentary on Luke"
uuid = "52272f6f-9ee8-46ed-8d42-884f6b3a1559"

[[commentary]]
quote='''
This was their main object, to rebuke Him before the people, which they were unable to do because of the wonderful wisdom of His answer.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title="Catena Aurea by Aquinas"
uuid = "50c34bbb-d973-4239-9af4-26051537c0cf"
