[[commentary]]
quote='''
Or thus: If, Me says, they have persecuted your Lord, much more will they persecute you; if they had persecuted Him, but kept His commandments, they would keep yours also.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title="Catena Aurea by Aquinas"
uuid = "a782cb79-b64a-484d-b126-f45e72ff20c9"

[[commentary]]
quote='''
What He said above, namely, that they hated Me before they hated you, He now sets forth more extensively, offering them greater consolation. "Remember," He says, "My word that a servant is not greater than his master. And you are not greater than Me. See then how they treated Me. If they persecuted Me—the Master, all the more will they persecute you—the servants. If they did not persecute Me but kept My word, then they will keep yours as well."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title="Commentary on John"
uuid = "4859e34c-7e4c-4ea5-a755-f3226b361c64"
