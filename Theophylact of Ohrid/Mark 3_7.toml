[[commentary]]
quote='''
But He departs, since the time of suffering had not yet come. He departs from the ungrateful also in order to benefit a greater number of people. Many indeed followed Him, and He healed them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title="Commentary on Mark"
uuid = "49ec5a56-0702-4286-9fa5-bda35d7f4332"

[[commentary]]
quote='''
At the same time again, He goes away, that by quitting the ungrateful He might do good to more, for many followed him, and he healed them.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title="Catena Aurea by Aquinas"
uuid = "2af56fab-5889-4f28-a8ba-3643f61a0e24"
