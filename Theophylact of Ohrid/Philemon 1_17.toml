[[commentary]]
quote='''
That is, if you acknowledge that you are of one mind with me, then receive him as you would me. Who would not be put to shame by the apostle? Who would not desire to receive Paul?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Philemon%2FPhilemon.html'
source_title="Commentary on Philemon"
