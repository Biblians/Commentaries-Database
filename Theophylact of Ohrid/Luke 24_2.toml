[[commentary]]
quote='''
They found the stone rolled away from the tomb, for the Angel had rolled it away, as Matthew says (Matt. 28:2).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title="Commentary on Luke"
uuid = "a54e6d40-8bf5-4b6f-af2e-faa15a4124c7"

[[commentary]]
quote='''
An angel had rolled it away, as Matthew declares.
'''
