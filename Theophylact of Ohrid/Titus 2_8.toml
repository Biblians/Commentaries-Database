[[commentary]]
quote='''
That is, orthodox, containing nothing blameworthy.

The adversary he calls either the devil, or anyone who serves him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Titus%2FChapter%25202.html'
