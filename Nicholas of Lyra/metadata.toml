summary = "Nicholas of Lyra, or Nicolaus Lyranus, a Franciscan teacher, was among the most influential practitioners of biblical exegesis in the Middle Ages. Little is known about his youth, aside from the fact of his birth, around 1270, in Lyre, Normandy."
