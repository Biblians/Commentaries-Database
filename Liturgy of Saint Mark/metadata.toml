summary = "The Liturgy of Saint Cyril is one of the three Anaphoras used at present by the Coptic Orthodox Church and the Coptic Catholic Church and it retains the liturgical peculiarities which have originated in the early Christian Egypt, thus forming the core of the historical Alexandrian Rite. When reference is made to its Greek Byzantine Rite version, this text is usually known as Liturgy of Saint Mark."
