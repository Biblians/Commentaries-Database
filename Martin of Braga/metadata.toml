summary = 'Martin of Braga, also known as Martin of Dumio, was an archbishop of Bracara Augusta in Gallaecia, a missionary, a monastic founder, and an ecclesiastical author. According to his contemporary, the historian Gregory of Tours, Martin was plenus virtutibus and in tantum se litteris imbuit ut nulli secundus sui temporis haberetur. He was later canonized by the Catholic Church for his work in converting the inhabitants of Gallaecia to Chalcedonian Christianity, being granted the cognomen of "Apostle to the Suevi". His feast day is 20 March.'
