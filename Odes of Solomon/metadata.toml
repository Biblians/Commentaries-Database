summary = "The Odes of Solomon are a collection of 42 odes, anonymous but long attributed to Solomon. There used to be confusion among scholars on the dating of the Odes of Solomon; however, most scholars date it to somewhere between AD 70 and 125. The original language of the Odes is thought to have been either Greek or Syriac, and the majority of scholars believe it to have been written by a Jewish Christian, very likely a convert from the Essene community to Christianity, because it contains multiple similarities to writings found in Qumran and to the Gospel of John. Some have argued that the writer had even personally seen John the Baptist."
