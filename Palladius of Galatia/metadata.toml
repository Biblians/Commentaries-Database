summary = "Palladius of Galatia was a Christian chronicler and the bishop of Helenopolis in Bithynia. He was a devoted disciple of Saint John Chrysostom. He is best remembered for his work, the Lausiac History. He was also the author of the Dialogue on the Life of Chrysostom."
