summary = "Caius, Presbyter of Rome was a Christian author who lived and wrote towards the beginning of the 3rd century. Only fragments of his works are known, which are given in the collection entitled The Ante-Nicene Fathers. However, the Muratorian fragment, an early attempt to establish the canon of the New Testament, is often attributed to Caius and is included in that collection."
