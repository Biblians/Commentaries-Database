summary = "The Codex Veronensis is a 5th-century Latin manuscript of the four Gospels, written on vellum which has been dyed purple. It is designated by the siglum b in the critical editions of Nestle-Åland and the UBS Greek New Testament, and 4 in the Beuron system of New Testament Latin manuscripts. The text is written in silver and occasionally gold ink, and is a version of the old Latin New Testament Gospels. The Gospels follow in the Western order."
