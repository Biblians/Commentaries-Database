summary = "The Lateran Council of 649 was a synod held in the Basilica of St. John Lateran to condemn Monothelitism, a Christology espoused by many Eastern Christians, and Pope Honorius. The Council did not achieve ecumenical status in either East or West, but represented the first attempt of a pope to convene an ecumenical council independent of the Roman emperor."
