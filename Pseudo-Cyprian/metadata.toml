summary = "Pseudo-Cyprian is the conventional designation for the anonymous authors of Latin works falsely attributed to Cyprian of Carthage. These works do not have a common transmission history. Most are not forgeries, but were texts mistakenly attributed to Cyprian from an early date in their transmission. In many cases the works were taken to be authentic until modern times."
