[[commentary]]
quote='''
To the corrupting power of riches [the Lord] made the enormity of voracious appetite antecedent; indeed, the former generates the latter.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Tertullian%2FOn%2520Fasting.html'
source_title="ON FASTING 6"
uuid = "9858bbd1-80fc-4d9c-85aa-e6120258c37c"
