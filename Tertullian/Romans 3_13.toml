[[commentary]]
quote='''
Anger has been prohibited, our spirits retained, the petulance of the hand checked, the poison of the tongue extracted.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Tertullian%2FOf%2520Patience.html'
source_title="Of Patience"
