
[[commentary]]
quote='''
We are not washed in order that we may cease sinning, but because we have ceased, since in heart we have been bathed already.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FOn%2520Repentance.html"
source_title="On Repentance"
uuid = "d5f3d6f9-b4ce-45da-859f-d0d76d08819c"
