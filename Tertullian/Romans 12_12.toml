[[commentary]]
quote='''
Now is not this of the same import as: "Thou shalt love thy neighbour as thy self? " (Again, your apostle says: ) "Rejoicing in hope; " that is, of God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FThe%2520Five%2520Books%2520Against%2520Marcion%2FBook%25205.html"
source_title="Against Marcion Book V"
uuid = "e6277f05-8848-4ef0-b021-72dede1295dd"

[[commentary]]
quote='''
"Patient in tribulation." You have (this in) the Psalm: "The Lord hear thee in the day of tribulation.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FThe%2520Five%2520Books%2520Against%2520Marcion%2FBook%25205.html"
source_title="Against Marcion Book V"
uuid = "dc9b4671-40ee-4d1c-8efa-a55795c24594"

[[commentary]]
quote='''
"Bless, and curse not," (says your apostle.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FThe%2520Five%2520Books%2520Against%2520Marcion%2FBook%25205.html"
