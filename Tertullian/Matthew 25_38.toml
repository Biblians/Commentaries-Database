
[[commentary]]
quote='''
"Have you seen," says Scripture, "a brother? you have seen your Lord; " -especially "a stranger," lest perhaps he be "an angel.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FOn%2520Prayer.html"
source_title="On Prayer"
