[[commentary]]
quote='''
For "a people," he says, "whom I knew not hath served me; in obedience of the ear it hath obeyed me." Prophets made the announcement.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Tertullian%2FAn%2520Answer%2520to%2520the%2520Jews.html'
source_title="An Answer to the Jews"
uuid = "2d5fa04a-bdd8-4901-a9a3-72a1b6d8e5a8"
