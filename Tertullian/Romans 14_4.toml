[[commentary]]
quote='''
For `to his own lord a man standeth or falleth; who art thou, to judge another's servant? ' `Remit, and remission shall be made to thee.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FOn%2520Modesty.html"
source_title="On Modesty"
uuid = "800e52a8-6ab0-468e-abda-1da5a30ac0ec"
