[[commentary]]
quote='''
The heavens, and the angels who are there, are glad at a man's repentance. Ho! you sinner, be of good cheer! you see where it is that there is joy at your return.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FOn%2520Repentance.html"
source_title="On Repentance"
uuid = "443a86b9-ee21-45ac-95a8-9c55e5b66b13"
