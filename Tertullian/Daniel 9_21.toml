[[commentary]]
quote='''
This was the evening fast, which offers a richer prayer to God, since it takes place with fasting during the evening.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Tertullian%2FOn%2520Fasting.html'
source_title="ON FASTING 10"
