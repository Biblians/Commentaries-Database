
[[commentary]]
quote='''
For a defiled spirit cannot be acknowledged by a holy Spirit, nor a sad by a joyful, nor a lettered by a free.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FOn%2520Prayer.html"
source_title="On Prayer"
