[[commentary]]
quote='''
Rightly then is he blessed because he was faithful; and rightly was he faithful because he was patient.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Tertullian%2FOf%2520Patience.html'
source_title="ON PATIENCE 6.2"
