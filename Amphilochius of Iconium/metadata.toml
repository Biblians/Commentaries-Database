summary = "Amphilochius of Iconium was a Christian bishop of the fourth century, son of a Cappadocian family of distinction, born, perhaps at Caesarea, ca. 339/340, died probably 394–403. He is venerated as a saint on November 22 in the Roman Catholic Church and on November 23 in the Orthodox Church."
