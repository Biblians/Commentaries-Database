summary = "Sahdona of Halmon also known as Sahdona of Mahoze and Sahdona the Syrian, Hellenised as Martyrius, was a 7th-century East Syriac monk, theologian and Bishop who later defected to the West Syriac Church before returning to the Church of the East."
