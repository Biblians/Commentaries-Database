summary = "The Gospel of Luke is third of the New Testament's canonical Gospels. It tells of the origins, birth, ministry, death, resurrection, and ascension of Jesus. Together with the Acts of the Apostles, it makes up a two-volume work called Luke–Acts, accounting for 27.5% of the New Testament."
