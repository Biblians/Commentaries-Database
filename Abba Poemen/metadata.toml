summary = 'Poemen the Great was a Christian monk and early Desert Father who is the most quoted Abba (Father) in the Apophthegmata Patrum. Poemen was quoted most often for his gift as a spiritual guide, reflected in the name "Poemen" ("Shepherd"), rather than for his asceticism. He is considered a saint in Eastern Christianity. His feast day is August 27 in the Julian calendar.'
