summary = "Aurelius Prudentius Clemens was a Roman Christian poet, born in the Roman province of Tarraconensis in 348. He probably died in the Iberian Peninsula some time after 405, possibly around 413. The place of his birth is uncertain, but it may have been Caesaraugusta (Zaragoza), Tarraco (Tarragona), or Calagurris (Calahorra)."
