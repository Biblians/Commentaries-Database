summary = "Apocalypse of Pseudo-Ephraem is a title given to two different pseudo-epigraphical texts attributed to the church father Ephrem the Syrian. One is extant in Syriac, and the other, based on a lost Syriac original, in Latin. These are respectively known as the Syriac Apocalypse of pseudo-Ephraim, and the Latin Apocalypse of pseudo-Ephraim. The Latin text has the reference number CPL 1144. It is one of the Syriac apocalyptic texts."
