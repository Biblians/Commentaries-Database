summary = "Andrew of Caesarea was a Greek theological writer and bishop of Caesarea in Cappadocia. Karl Krumbacher assigned him to the first half of the sixth century. He is variously placed by other scholars, from the fifth to the ninth century. However, today it is unquestionable that his life spanned the late sixth/early seventh centuries."
