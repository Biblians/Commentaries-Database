[[commentary]]
quote='''
It is the sin of heresy, or of blasphemy against the Holy Spirit, which leads to death. If one man sins against another, pray for him. But if he sins against God, who is there who can pray on his behalf?
'''
source_url=''
source_title="CATENA"
