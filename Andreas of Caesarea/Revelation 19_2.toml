[[commentary]]
quote='''
God has "avenged the blood of his servants from the hand" of Babylon and has benefited her inhabitants by accomplishing the cessation of sin through its punishment.
'''
source_url=''
source_title="COMMENTARY ON THE APOCALYPSE 19:1-4"
