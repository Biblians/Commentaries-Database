[[commentary]]
quote='''
If a layman divorces his own wife, and takes another, or one divorced by another, let him be suspended.
'''
source_url='https://www.newadvent.org/fathers/07158.htm'
source_title="Apostolic Constitutions (Book VIII), The Ecclesiastical Canons of the Same Holy Apostles, Section 48"
uuid = "77f11c54-0f9a-4da3-998a-f30c14cc8cc1"
