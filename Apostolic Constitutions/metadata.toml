summary = "The Apostolic Constitutions or Constitutions of the Holy Apostles is a Christian collection divided into eight books which is classified among the Church Orders, a genre of early Christian literature, that offered authoritative pseudo-apostolic prescriptions on moral conduct, liturgy and Church organization. The work can be dated from 375 to 380 AD. The provenance is usually regarded as Syria, probably Antioch. The author is unknown, although since James Ussher it has been often considered to be the same author as that of the letters of Pseudo-Ignatius, perhaps the 4th-century Eunomian bishop Julian of Cilicia."
