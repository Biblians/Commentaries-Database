[[commentary]]
quote='''
Nero said: Art thou not afraid, Peter, of Simon, who confirms his godhead by deeds? Peter said: Godhead is in Him who searcheth the hidden things of the heart.
'''
source_url='https://www.newadvent.org/fathers/0715.htm'
source_title="CONSTITUTIONS OF THE HOLY APOSTLES"
uuid = "86f2e623-7daa-4c6d-a930-550a6089f9c1"
