summary = "Lucius Caecilius Firmianus Lactantius was an early Christian author who became an advisor to Roman emperor Constantine I, guiding his Christian religious policy in its initial stages of emergence, and a tutor to his son Crispus. His most important work is the Institutiones Divinae, an apologetic treatise intended to establish the reasonableness and truth of Christianity to pagan critics."
