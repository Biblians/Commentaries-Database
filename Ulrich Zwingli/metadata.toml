summary = "Huldrych Zwingli was a Swiss Christian theologian, musician, and leader of the Reformation in Switzerland. Born during a time of emerging Swiss patriotism and increasing criticism of the Swiss mercenary system, he attended the University of Vienna and the University of Basel, a scholarly center of Renaissance humanism. He continued his studies while he served as a pastor in Glarus and later in Einsiedeln, where he was influenced by the writings of Erasmus. During his tenures at Basel and Einsiedeln, Zwingli began to familiarize himself with many criticisms Christian institutions were facing regarding their reform guidance and garnered scripture which aimed to address such criticisms."
