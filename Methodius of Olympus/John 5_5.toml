[[commentary]]
quote='''
They saw a paralytic, who had grown up, as it were, and become one with his infirmity, at His bidding loosed from his disease.
'''
source_url="http://ccel.org/fathers2/ANF-06/anf06-126.htm"
source_title="Methodius Oration on the Psalms"
uuid = "2ad52b95-38e0-454f-b44e-137a5dc90e9d"
