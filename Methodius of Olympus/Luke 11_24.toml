[[commentary]]
quote='''
And He who makes us free from the law, became subject to the law; and there is offered for Him, who hath sanctified us, a pair of clean birds,
'''
source_url="http://ccel.org/fathers2/ANF-06/anf06-125.htm"
source_title="Methodius Oration Concerning Simeon and Anna"
uuid = "244973b1-9ddc-4d07-94f7-7bb44731ce75"
