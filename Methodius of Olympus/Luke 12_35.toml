[[commentary]]
quote='''
Blessed are ye, when he shall make you sit down, and shall come and serve you. And if he come in the second, or in the third watch, ye are blessed."
'''
source_url="http://ccel.org/fathers2/ANF-06/anf06-113.htm#P5124_1542330"
source_title="Methodius Discourse V. Thallousa"
uuid = "9567812b-0f0c-4825-bbf7-4e9eda5354eb"
