[[commentary]]
quote='''
In psalms and hymns, let us raise to Him our shouts of thanksgiving; and, without ceasing, let us exclaim, "Blessed is He that cometh in the name of the Lord; "
'''
source_url="http://ccel.org/fathers2/ANF-06/anf06-126.htm"
source_title="Methodius Oration on the Psalms"
uuid = "64e1d926-bc24-4ba2-95c6-701ab5c52733"
