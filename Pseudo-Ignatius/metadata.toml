summary = "Pseudo-Ignatius was a 4th-century writer who claimed to be Ignatius of Antioch. He is the author of the Ignatian forgeries but he also wrote the Apostolic Constitutions and a Commentary on Job. Harnack also identified Pseudo-Clement with Pseudo-Ignatius. Pseudo-Ignatius has some Arian leanings but is not completely Arian; on the other hand, he in some ways resembles the Apollinarians. However it is not possible to draw clear conclusions on his Christology."
