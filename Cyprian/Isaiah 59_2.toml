[[commentary]]
quote='''
Let us consider our sins, and reviewing the secrets of our action and mind, let us weigh the merits of our conscience.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyprian%2FTreatise%25203.%2520On%2520the%2520Lapsed.html'
source_title="Treatise III. On the Lapsed 21"
uuid = "8c0b7891-23bb-4e0b-97af-850136b8e703"


[[commentary]]
quote='''
The Lord can prohibit adversities, but the merits of sinners cause him to give no aid.… Therefore, let your sins and offences be numbered; let the wounds of your conscience be considered; and let each one cease to complain about God and about us, if he understands that he deserves what he suffers.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyprian%2FTreatise%25205.%2520An%2520Address%2520to%2520Demetrianus.html'
source_title="Treatise V. An Address to Demetrianus 11"
uuid = "828ac1a7-067c-4a23-b2be-c0b5d144958f"
