summary = 'Pseudo-Philo is the name commonly used for the unknown, anonymous author of the Biblical Antiquities. This text is also commonly known today under the Latin title Liber Antiquitatum Biblicarum, a title that is not found in the Latin manuscripts. Although probably originally written in Hebrew, it is preserved today only through a Latin translation found in 18 complete and 3 fragmentary manuscripts that date between the eleventh and fifteenth centuries CE. In addition, material paralleling that in the Biblical Antiquities is also found in the Chronicles of Jerahmeel, a 14th-century Hebrew composition. The Latin text of the Biblical Antiquities circulated alongside Latin translations of the authentic writings of Philo of Alexandria. Scholars have long asserted the pseudonymous character of the text now known as the Biblical Antiquities. Primary in this regard is a vastly differing approach to and use of the Jewish scriptures. For the sake of convenience, scholars continue to follow the lead of Leopold Cohn in calling the unknown author "Pseudo-Philo".'
