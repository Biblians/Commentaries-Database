summary = "The Synod of Ancyra was an ecclesiastical council, or synod, convened in Ancyra, the seat of the Roman administration for the province of Galatia, in 314. Together with the synods of Neocaesarea, Antioch, Gangra and Laodicea, the canons of the council formed the nucleus of nearly all future collections of church law."
