summary = 'Basil of Seleucia was a Roman Bishop and ecclesiastical writer. He was archbishop of Seleucia ad Calycadnum by 448. He condemned Eutyches in the year 448, "acquiesced" while "rehabilitating" at the Latrocinium in 449, "but recanted and signed" the Tome of Leo in 450.'
