[[commentary]]
quote='''
Then follows the refutation: amen I say to you: as long as you did it not to one of these least, neither did you do it to me. A similar passage is found in Luke 10:16: he that despiseth you despiseth me; Zechariah 2:8: he that toucheth you, toucheth the apple of my eye.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title="Commentary on Matthew"
uuid = "25111667-73db-4c80-b7a1-8576087a7074"
