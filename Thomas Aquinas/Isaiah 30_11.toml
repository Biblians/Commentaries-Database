[[commentary]]
quote='''
Turn away, inasmuch as they prohibited the word of divine knowledge: who have said to God: depart from us, we desire not the knowledge of your ways (Job 21:14).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
uuid = "87ce4ab9-4c13-4730-9fef-2ae09a691974"
