[[commentary]]
quote='''
Second, the mercy from prayer is then referred to: "Thou didst hear my plea, 'Do not close thine ear to my cry for help'."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
