[[commentary]]
quote='''
After this the malice is treated. And first with respect to the first group; secondly, with respect to the second; thirdly, with respect to the third. "And the husbandmen laying hands on his servants, beat one," as Micaiah, "killed another," as Isaiah, "and stoned another," as Naboth. Heb 11:37: "They were stoned, they were cut asunder, they were killed by the sword."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title="Commentary on Matthew"
uuid = "82bcf105-8dea-4379-af4c-e6ee6d0ff9d8"
