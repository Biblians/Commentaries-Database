[[commentary]]
quote='''
He shows the fruit of humility saying, "For he freed my soul," in confessing his sin, "from going to destruction," which refers to death, corporeal or spiritual. He also wants to attain further goods and so he says, "but in living my soul will see the light," which is either the corporeal light or the spiritual light of wisdom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title="Commentary on Job"
uuid = "ef4d5504-1133-4a9f-a1ac-677056ca2faa"
