[[commentary]]
quote='''
And he laments three things.

First, the horror of death: in the midst of my days, that is, in my youth, to the gates of hell, that is, limbo, or death, or the grave: my life was drawing near to hell beneath (Sir 51:6).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
uuid = "c5d30d0d-03a4-4c11-b931-0117887723c7"
