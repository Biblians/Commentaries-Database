[[commentary]]
quote='''
To spiritual joy: and the meek shall increase their joy: I will be glad, and rejoice in you: I will sing to your name, O you Most High (Ps 9:3[2]).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
