[[commentary]]
quote='''
Second, he sets out the promise: for thus says the Lord. And first, in those things pertaining especially to eunuchs: they that shall keep my sabbaths, as to religious worship, and shall choose the things that please me, as to obedience of the law, and shall hold fast my covenant, as to observance of the promise to abstain from evils.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
uuid = "571f1f2f-eb5f-4ff0-b69d-745ce0ed7572"
