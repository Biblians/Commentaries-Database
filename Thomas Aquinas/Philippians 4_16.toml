[[commentary]]
quote='''
For even in Thessalonica you sent me help once and again. This is the reason why the Pope can take from one church to help another; but not without cause.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Philippians.html'
source_title="Commentary on Philippians"
