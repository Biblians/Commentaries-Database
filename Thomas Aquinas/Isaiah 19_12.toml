[[commentary]]
quote='''
Second, he mocks the confidence of the king: where now, and first, the question, below: there is none that can save you (Isa 47:15); second, the answer: fools have withered away, that is, have failed, as above.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
uuid = "cba5b9d8-8cca-42fb-8ba9-3bba4a2d4460"
