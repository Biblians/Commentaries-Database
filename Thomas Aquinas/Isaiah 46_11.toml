[[commentary]]
quote='''
And he sets out the order of liberation: who call a bird from the east, Cyrus, called a bird because of the swiftness of his victory; or Christ, above: who has raised up the just one from the east? (Isa 41:2).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
uuid = "1c705325-f0d3-4f20-a5a5-b983c3a99716"
