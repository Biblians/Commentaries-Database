[[commentary]]
quote='''
Third as to men who live in dangers, and so he says, "The blessing of the man perishing came upon me," that is, the man who had been helped by me in dangers, blessed me. Fourth as to widows, and so he says, "and I have consoled the heart of the widow," because she had lost the consolation of a husband.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title="Commentary on Job"
uuid = "105a02ef-cb77-4734-acd7-0bdd8a20f02d"
