[[commentary]]
quote='''
Third, Rabsaces's mockery of their response is set out: and Rabsaces said to them; urine of their feet, which flowed at their feet: they that were brought up in scarlet have embraced the dung (Lam 4:5).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
uuid = "7d4e20f5-8f7e-4709-a03b-f45b5e9bc7e7"
