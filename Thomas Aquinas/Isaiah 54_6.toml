[[commentary]]
quote='''
And as to marriage: for the Lord has called you as a woman forsaken: if a man put away his wife, and she go from him, and marry another man, shall he return to her any more? (Jer 3:1).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
uuid = "f9b2315f-e1c4-4e17-acd3-f93e14fa309b"
