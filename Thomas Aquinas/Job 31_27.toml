[[commentary]]
quote='''
"And my heart secretly rejoiced," as though I were devoted to them from interior worship. As for exterior cult he says, "and I kissed my hand with my lips."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title="Commentary on Job"
uuid = "5826b781-3ddd-493e-8184-f3c7a1e2ae48"
