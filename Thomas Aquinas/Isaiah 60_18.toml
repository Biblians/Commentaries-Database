[[commentary]]
quote='''
And he also sets out the effect of justice as to the absence of wickedness: iniquity shall no more be heard in your land, because for some time the laws will be well observed (2 Macc 3:1); or iniquity, of idolatry. Mystically, this refers to the state of future beatitude: as far as the east is from the west, so far has he removed our iniquities from us (Ps 102[103]:12).

And as to the absence of misery: wasting, as to their fields; destruction, as to men thus crushed by their enemies; your gates, in which the people assembled for judgments.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
uuid = "1e4c4d5a-c9e3-438c-8d72-58ff6a7212e8"
