[[commentary]]
quote='''
As to his blood relatives or who depend on him in any way he says, "My relatives abandoned me," not bringing me any aid. As for those, however, with whom he had been associated once he says, "and those who knew me," that is, once as an intimate friend, now in trial, "have forgotten me," namely, do not care for me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title="Commentary on Job"
uuid = "b8e7ed7b-a25a-4d25-99cc-df76e3696e18"
