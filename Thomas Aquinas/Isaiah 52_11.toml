[[commentary]]
quote='''
Second, he enjoins the captives to flee: depart, namely, from Babylonia; touch no unclean thing, do not live among these unclean people: go out from her, my people (Rev 18:4).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
uuid = "b5134e04-15d3-41f9-8bd0-29c7bc1f0f82"
