[[commentary]]
quote='''
And so he says, "They crouch to bring forth their young," which they bring forth, "and give birth," by themselves instructed by nature. Still giving birth is not delightful, but painful for them, and so he says, "and they bring it forth roaring," because of the pain which they suffer in giving birth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title="Commentary on Job"
uuid = "a5666d54-6051-4545-b91b-ae9f2d57ef8f"
