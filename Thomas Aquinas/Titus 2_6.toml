[[commentary]]
quote='''
Then he teaches Titus how to instruct the young men, namely, that they be sober: he repeats this, because drunkenness is the source of many vices: be sober (1 Pet 5:8).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Titus.html'
source_title="Commentary on Titus"
uuid = "cab6d727-67d3-4d38-81f1-9779afb7bcae"
