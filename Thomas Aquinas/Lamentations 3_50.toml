[[commentary]]
quote='''
There is then a final lamentation: "Until the Lord of heaven looks down and sees." Namely, with his eyes of divine mercy. Since Psalm 102:19 says: "That he looked down from his holy height, from heaven the Lord looked at the earth."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title="Commentary on Lamentations"
