[[commentary]]
quote='''
Since he did not believe that he was just he then says, "But if you do not have," something to say on behalf of your justice, "hear me, be silent, and I will teach you wisdom," of which you are ignorant.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title="Commentary on Job"
uuid = "2d566ffd-3a40-4745-bc49-e9446a0ef7dd"
