[[commentary]]
quote='''
Tertius, Paul's secretary, was allowed to greet the Romans personally with Paul's consent. Hence he adds: I, Tertius, the writer of this letter, greet you in the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title="Commentary on Romans"
uuid = "20e025c5-d1c6-49bd-8888-f78b44fd2ad4"
