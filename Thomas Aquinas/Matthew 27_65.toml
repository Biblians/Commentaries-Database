[[commentary]]
quote='''
There follows the granting: "Pilate said to them: you have a guard"; i.e., have a guard; as if saying: it is in your power to guard him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title="Commentary on Matthew"
uuid = "bea5e573-6656-4b08-92d8-9b7b97d7b84c"
