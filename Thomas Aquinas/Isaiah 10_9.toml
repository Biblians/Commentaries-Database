[[commentary]]
quote='''
Second, the subjugation of cities: is not Calano as Charcamis, below: for of a truth, O Lord, the kings of the Assyrians have laid waste lands, and their countries (Isa 37:18).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
uuid = "24b59c3f-7881-481e-ba78-4daf1ceb48d5"
