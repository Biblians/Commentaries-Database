[[commentary]]
quote='''
Second, memory reduces itself to the benefits the people received. "My soul continually thinks of it," the benefits.

And: "is bowed down within me." That is, memory fails from admiration, or desire. As Psalm 42:4 says: "These things I remember, as I pour out my soul."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title="Commentary on Lamentations"
