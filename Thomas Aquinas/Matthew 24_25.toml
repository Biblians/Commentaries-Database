[[commentary]]
quote='''
Behold I have told it to you beforehand, because, according to Gregory, darts that are foreseen wound less; Amos 3:7: The Lord God will do nothing without revealing his secret.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title="Commentary on Matthew"
