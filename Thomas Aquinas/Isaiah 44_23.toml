[[commentary]]
quote='''
Third, he invites all creation to give thanks for the return: shout with joy, you ends of the earth: let the heavens and the earth praise him; the sea (Ps 68:35[69:34]).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
