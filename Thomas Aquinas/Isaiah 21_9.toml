[[commentary]]
quote='''
Second, he declares what he has seen: behold this man comes, as above;

third, the punishment of Babylon: Babylon is fallen: you are taken, O Babylon, and you were not aware of it (Jer 50:24).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
uuid = "465b5236-40c1-4461-86ee-77d7af2a95a2"
