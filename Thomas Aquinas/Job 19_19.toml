[[commentary]]
quote='''
Then he also says he is despised by wise men whom he once regarded as intimate friends, and so he says, "Once my counselors, they despised me," namely these men whom I used to admit to my counsel because of their wisdom, "and he whom I loved most is against me." Perhaps he says this because one of those who were present was more hostile to him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title="Commentary on Job"
uuid = "5e1a00be-29c9-4f28-9fa1-7be51499de55"
