[[commentary]]
quote='''
And so he says, "my lips will not speak evil," in saying everyone who suffers adversities is evil, "nor will my tongue practice deceit," in saying that it belongs to divine justice to reward the merits of the just by present prosperity and to punish the sins of the wicked by temporal adversity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title="Commentary on Job"
uuid = "6bf4ff28-0f9e-40dc-9d42-389d418a2e3a"
