[[commentary]]
quote='''
Then he says, greet Philologus and Julia, Nereus and his sister, and Olympias and all the saints who are with them, i.e., sanctified in the faith of Christ: you were washed, you were sanctified (1 Cor 6:11).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title="Commentary on Romans"
uuid = "077289c6-7473-446b-9487-75b4a053b774"
