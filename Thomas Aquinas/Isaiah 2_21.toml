[[commentary]]
quote='''
Second, he returns to the protection of hiding, where it says, "and he shall go into the clefts of rocks": "every bondman and every freeman hid themselves in the dens and in the rocks of mountains" (Rev 6:15).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
uuid = "da5926e2-791b-4f3f-99d4-4c6b18e2701c"
