summary = "Paschasius Radbertus (785–865) was a Carolingian theologian and the abbot of Corbie, a monastery in Picardy founded in 657 or 660 by the queen regent Bathilde with a founding community of monks from Luxeuil Abbey. His most well-known and influential work is an exposition on the nature of the Eucharist written around 831, entitled De Corpore et Sanguine Domini. He was canonized in 1073 by Pope Gregory VII. His feast day is 26 April."
