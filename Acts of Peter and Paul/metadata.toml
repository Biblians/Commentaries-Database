summary = 'The Acts of Peter and Paul is a pseudepigraphical 5th century Christian text of the genre Acts of the Apostles. An alternate version exists, known as the Passion of Peter and Paul, with variances in the introductory part of the text. Some versions have been written by a certain Marcellus, thus the anonymous author, of whom nothing further is known and is sometimes referred to as pseudo-Marcellus. The intended Marcellus is doubtless he who after the martyrdom takes the lead in burying St. Peter "near the Naumachia in the place called the Vatican."'
