summary = "Sophronius, called Sophronius the Sophist, was the Greek Patriarch of the city known as Aelia Capitolina and then Jerusalem from 634 until his death. He is venerated as a saint in the Eastern Orthodox and Catholic Churches. Before rising to the primacy of the See, he was a monk and theologian who was the chief protagonist for orthodox teaching in the doctrinal controversy on the essential nature of Jesus and his volitional acts. He is also renowned for the negotiation of the surrender of Aelia Capitolina to the Rashid caliph Umar in 637/8."
