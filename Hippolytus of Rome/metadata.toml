summary = "Hippolytus of Rome was one of the most important Christian thinkers of the second and third centuries, though his provenance, identity, and corpus remain elusive to scholars and historians. Suggested communities include Rome, Palestine, Egypt, Anatolia, and other regions of the Middle East. The best historians of literature in the ancient church, including Eusebius and Jerome, openly admit they cannot name where Hippolytus the biblical commentator and theologian served in leadership. They had read his works but did not possess evidence of his community. Photios I of Constantinople describes him in his Bibliotheca as a disciple of Irenaeus, who was said to be a disciple of Polycarp; from the context, it seems Photios was suggesting Hippolytus publicly identified himself in this way. But this assertion is doubtful. One older theory claims he came into conflict with the popes of his time and seems to have headed a schismatic group as a rival to the bishop of Rome, thus becoming an antipope. In this view, he opposed the Roman popes because they softened the penitential system to accommodate the large number of new pagan converts. However, he was reconciled to the Church before he died as a martyr."
