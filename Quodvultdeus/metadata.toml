summary = "Quodvultdeus was a fifth-century Church Father and Bishop of Carthage who was exiled to Naples. He was known to have been living in Carthage around 407 and became a deacon in 421 AD. He corresponded with Augustine of Hippo, who served as Quodvultdeus' spiritual teacher. Augustine also dedicated some of his writings to Quodvultdeus."
