summary = "De recta in Deum fide, also known as the Dialogue of Adamantius, is an anonymous Christian dialogue in Greek from the late 3rd or early 4th century. It was probably written in Asia Minor or Syria. It is a defence of Christian orthodoxy against the heresies of Marcionism and Gnosticism."
