summary = 'Hilary of Poitiers or St Hilarius was Bishop of Poitiers and a Doctor of the Church. He was sometimes referred to as the "Hammer of the Arians" and the "Athanasius of the West". His name comes from the Latin word for happy or cheerful. Prior to his conversion to Christianity, Hilary married someone, and then fathered Abra of Poitiers, a nun and saint who became known for her charity.'
