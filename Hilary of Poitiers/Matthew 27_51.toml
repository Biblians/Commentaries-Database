[[commentary]]
quote='''
Or, The veil of the temple is rent, because from this time the nation was dispersed, and the honour of the veil is taken away with the guardianship of the protecting Angel.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252027.html'
source_title="Catena Aurea by Aquinas"
uuid = "a3dd2acd-79b9-4503-8ed2-94171a85b5c3"

[[commentary]]
quote='''
The earth quaked, because it was unequal to contain such a body; the rocks rent, for the Word of God that pierces all strong and mighty things, and the virtue of the eternal Power had penetrated them.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252027.html'
source_title="Catena Aurea by Aquinas"
uuid = "91ffd027-e43a-4bab-8548-a050504d1ee8"
