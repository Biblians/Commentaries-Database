summary = "Gennadius of Constantinople was the patriarch of Constantinople from August 458 until his death. Gennadius is known to have been a learned writer who followed the School of Antioch of literal exegesis, although few writings have been left about him. He is commemorated in the Eastern Orthodox Church on 17 November but is not listed in the Roman Martyrology."
