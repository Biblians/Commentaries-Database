summary = 'The Book of Revelation, also known as the Book of the Apocalypse or the Apocalypse of John, is canonically the last book of the New Testament. Written in Greek, its title is derived from the first word of the text, apocalypse, which means "revelation" or "unveiling". The Book of Revelation is the only apocalyptic book in the New Testament canon, and occupies a central place in Christian eschatology.'
