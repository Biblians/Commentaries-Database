summary = "The Desert Fathers were early Christian hermits and ascetics, who lived primarily in the Wadi El Natrun, then known as Skete, in Roman Egypt, beginning around the third century. The Sayings of the Desert Fathers is a collection of sayings and other texts attributed to desert monks and nuns from this era."
