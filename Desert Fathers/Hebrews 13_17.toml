[[commentary]]
quote='''
The hermits used to say, 'God demands this of Christians: to obey the inspired Scriptures, which contain the pattern of what they must say and do, and agree with the teaching of the orthodox bishops and teachers.'
'''
source_url='https://books.google.com/books/about/The_Desert_Fathers.html?id=UkbZy7-SqjkC'
source_title="The Desert Fathers, Sayings of the Early Christian Monks"
uuid = "8a1d428d-2229-4a47-be6b-e4051733dfec"
