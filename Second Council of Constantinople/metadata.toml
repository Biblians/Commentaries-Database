summary = "The Second Council of Constantinople is the fifth of the first seven ecumenical councils recognized by both the Eastern Orthodox Church and the Catholic Church. It is also recognized by the Old Catholics and others. Protestant opinions and recognition of it are varied. Some Protestants, such as Calvinists, recognize the first four councils, whereas Lutherans and most Anglo-Catholics accept all seven. Constantinople II was convoked by the Byzantine Emperor Justinian I under the presidency of Patriarch Eutychius of Constantinople. It was held from 5 May to 2 June 553. Participants were overwhelmingly Eastern bishops—only sixteen Western bishops were present, including nine from Illyricum and seven from Africa, but none from Italy—out of the 152 total."
