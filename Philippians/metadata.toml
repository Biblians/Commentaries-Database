summary = """The Epistle to the Philippians is a Pauline epistle of the New Testament of the Christian Bible. The epistle is attributed to Paul the Apostle and Timothy is named with him as co-author or co-sender. The letter is addressed to the Christian church in Philippi. Paul, Timothy, Silas first visited Philippi in Greece (Macedonia) during Paul's second missionary journey from Antioch, which occurred between approximately 50 and 52 AD. In the account of his visit in the Acts of the Apostles, Paul and Silas are accused of "disturbing the city"."""
