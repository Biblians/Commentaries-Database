summary = "The Epistle of Jude is the penultimate book of the New Testament and of the Christian Bible. The Epistle of Jude claims authorship by Jude, identified as a servant of Jesus and brother of James, though there is scholarly debate about his exact identity, literacy, and the letter's date. It was most likely written in the late first century, with some considering its authorship pseudepigraphical."
