[[commentary]]
quote='''
(interlin.) Or, All things are now ready, i. e. The entrance into the kingdom, which had been hitherto closed, is now ready through faith in My incarnation.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252022.html'
source_title="Catena Aurea by Aquinas"
