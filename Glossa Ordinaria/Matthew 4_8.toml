[[commentary]]
quote='''
(ord.) He saw not, as we see, with the eye of lust, but as a physician looks on disease without receiving any hurt.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25204.html'
source_title="Catena Aurea by Aquinas"
