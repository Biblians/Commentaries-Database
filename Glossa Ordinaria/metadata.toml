summary = 'The Glossa Ordinaria, which is Latin for "Ordinary [i.e. in a standard form] Gloss", is a collection of biblical commentaries in the form of glosses. The glosses are drawn mostly from the Church Fathers, but the text was arranged by scholars during the twelfth century. The Gloss is called "ordinary" to distinguish it from other gloss commentaries. In origin, it is not a single coherent work, but a collection of independent commentaries which were revised over time. The Glossa Ordinaria was a standard reference work into the Early Modern period, although it was supplemented by the Postills attributed to Hugh of St Cher and the commentaries of Nicholas of Lyra.'
