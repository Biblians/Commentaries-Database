summary = '2 Peter, also known as the Second Epistle of Peter and abbreviated as 2 Pet., is an epistle of the New Testament written in Koine Greek. It identifies the author as "Simon Peter, a bondservant and apostle of Jesus Christ". The epistle is traditionally attributed to Peter the Apostle, but most critical scholars consider the epistle pseudepigraphical. Scholars estimate the date of authorship anywhere from AD 60 to 150.'
