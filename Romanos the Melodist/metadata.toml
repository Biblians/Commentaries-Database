summary = 'Romanos the Melodist was a Byzantine hymnographer and composer, who is a central early figure in the history of Byzantine music. Called "the Pindar of rhythmic poetry", he flourished during the sixth century, though the earliest manuscripts of his works are dated centuries after this. He was the foremost Kontakion composer of his time.'
