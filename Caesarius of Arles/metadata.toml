summary = """Caesarius of Arles, sometimes called "of Chalon" from his birthplace Chalon-sur-Saône, was the foremost ecclesiastic of his generation in Merovingian Gaul. Caesarius is considered to be of the last generation of church leaders of Gaul who worked to integrate large-scale ascetic elements into the Western Christian tradition. William E. Klingshirn's study of Caesarius depicts Caesarius as having the reputation of a "popular preacher of great fervour and enduring influence". Among those who exercised the greatest influence on Caesarius were Augustine of Hippo, Julianus Pomerius, and John Cassian."""
