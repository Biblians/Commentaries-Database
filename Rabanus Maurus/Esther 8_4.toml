[[commentary]]
quote='''
The supreme king holds out his golden scepter toward the queen as she pleads with him, because he is lavishing on her the mercy of his righteousness.
'''
source_url='https://sites.google.com/site/aquinasstudybible/home/esther/rabanus-maurus-commentary-on-esther'
source_title="Commentary on Esther"
uuid = "85bfc3a4-d7da-4c59-9390-15bcf3e569a8"

[[commentary]]
quote='''
The heavenly king holds out his golden scepter to the pleading queen because he abundantly bestows the clemency of his mercy upon her.
'''
source_url=''
source_title="EXPLANATION ON THE BOOK OF ESTHER 11"
uuid = "8a30d61b-319e-4773-839a-6ae15b59364b"
