[[commentary]]
quote='''
After receiving the price of my sins and being re-established, and the covenant made with me, then do I understand my evil deeds, and I am confounded, and within I punish myself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Ezekiel%2FTranslation-Hooker-Pearse.pdf'
source_title="HOMILIES ON EZEKIEL 10:5"
uuid = "8b6053f8-c610-4fd3-850c-634efd86a147"


[[commentary]]
quote='''
Let us pray with all our heart that God would grant us to fight for truth to the very end of our mind and body.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Ezekiel%2FTranslation-Hooker-Pearse.pdf'
source_title="HOMILIES ON EZEKIEL 10:5"
uuid = "2bd515a2-c64c-4c62-b23a-99769401127c"
