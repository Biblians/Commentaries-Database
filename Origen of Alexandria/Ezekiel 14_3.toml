[[commentary]]
quote='''
No one among us thinks that tortures are inflicted by anyone other than ourselves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Ezekiel%2FTranslation-Hooker-Pearse.pdf'
source_title="HOMILIES ON EZEKIEL 3:7"
uuid = "0473ad89-e66a-4d9c-ae7c-99a4ead9b548"


[[commentary]]
quote='''
When the interior person perseveres according to the image of the Creator, then a person is born, and twice is the person made a person according to the exterior and the interior kind.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Ezekiel%2FTranslation-Hooker-Pearse.pdf'
source_title="HOMILIES ON EZEKIEL 3:8"
uuid = "6bf05207-a9e3-4e56-9f75-ac4f5af11355"
