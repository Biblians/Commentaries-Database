summary = 'Origen of Alexandria, also known as Origen Adamantius, was an early Christian scholar, ascetic, and theologian who was born and spent the first half of his career in Alexandria. He was a prolific writer who wrote roughly 2,000 treatises in multiple branches of theology, including textual criticism, biblical exegesis and hermeneutics, homiletics, and spirituality. He was one of the most influential and controversial figures in early Christian theology, apologetics, and asceticism. He has been described by John Anthony McGuckin as "the greatest genius the early church ever produced".'
