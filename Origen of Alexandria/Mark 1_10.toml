[[commentary]]
quote='''
A dove—a tame, innocent and simple bird. Hence we are taught to copy the innocence of doves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Luke.html'
source_title="HOMILIES ON LUKE, HOMILY 27"
uuid = "cab86fa1-d138-47b1-936e-83ad956214da"
