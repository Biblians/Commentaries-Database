[[commentary]]
quote='''
When we are of a greater age and can therefore sin, angels look for a chance to influence us, and that is as true of the angels of God as it is of the angels of Satan.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Ezekiel%2FTranslation-Hooker-Pearse.pdf'
source_title="HOMILIES ON EZEKIEL 6:8"
uuid = "42a26cd4-1c03-40c6-9fdf-1fe2c4ed8200"


[[commentary]]
quote='''
Let us pray that the mercy of God will come on us and wash away the blood from our souls.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Ezekiel%2FTranslation-Hooker-Pearse.pdf'
source_title="HOMILIES ON EZEKIEL 6:9"
uuid = "5688b775-37dd-4b8f-9805-798b052fdb64"
