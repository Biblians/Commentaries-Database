[[commentary]]
quote='''
Next they arrive at Charadath [Haradah], which in our language signifies "made competent." Indeed, this is just what Paul says, "He has made us competent to be ministers of a new covenant."
'''
source_url='https://www.google.com/books/edition/Homilies_on_Numbers/P4pPyRXeWkUC?hl=en&gbpv=0'
source_title="HOMILIES ON NUMBERS 27:12"
uuid = "a3f1b9d8-1309-4b2b-83cf-5cf496cd720e"
