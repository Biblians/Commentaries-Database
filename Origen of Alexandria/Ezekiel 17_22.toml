[[commentary]]
quote='''
There is one who dishonors the judgment of God; there is another who honors it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Ezekiel%2FTranslation-Hooker-Pearse.pdf'
source_title="HOMILIES ON EZEKIEL 12:4"
uuid = "b1fb43a1-925e-4408-8c51-81278b979668"


[[commentary]]
quote='''
To the one who has transgressed and has dishonored the judgment of God, Pharaoh cannot come to the rescue; he will die in the center of Babylon for his transgressions.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Ezekiel%2FTranslation-Hooker-Pearse.pdf'
source_title="HOMILIES ON EZEKIEL 12:4"
uuid = "99f5967e-9e19-4ea0-99fd-f5a98eb03634"
