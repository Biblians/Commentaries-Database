[[commentary]]
quote='''
The expression "aglow with the Spirit" proves that the Word of God is hot and fiery.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FDe%2520Principiis%2FBook%25202.html'
source_title="ON FIRST PRINCIPLES 2.8.3"
uuid = "fc74d61a-345b-48ab-9657-f9f0e078f426"
