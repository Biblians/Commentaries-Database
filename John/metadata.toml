summary = "The Gospel of John is the fourth gospel of the canonical gospels in the New Testament. The first section of the gospel presents a schematic account of the ministry of Jesus, with seven signs that culminate in the raising of Lazarus and validate the truth of his words. The second part of the text portrays the final week of Jesus’s life, recounting the Farewell Discourse and the passion and resurrection narratives."
