summary = "The Gospel of James is a second-century infancy gospel telling of the miraculous conception of Mary, the mother of Jesus, her upbringing and marriage to Joseph, the journey of the couple to Bethlehem, the birth of Jesus, and events immediately following. It is the earliest surviving assertion of the perpetual virginity of Mary, meaning her virginity not just prior to the birth of Jesus, but during and afterwards, and despite being condemned by Pope Innocent I in 405 and classified as apocryphal by the Gelasian Decree around AD 500, became a widely influential source for Mariology."
