summary = "Fructuosus of Braga was the Bishop of Dumio and Archbishop of Braga, also known for being a great founder of monasteries. The son of a Visigothic dux in the region of Bierzo, at a young age he accompanied his father on official trips over his estates. After a period spent as a hermit, he established a monastery at Complutum and became its first abbot."
