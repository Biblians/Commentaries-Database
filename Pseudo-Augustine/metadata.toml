summary = "Pseudo-Augustine is the name given by scholars to the authors, collectively, of works falsely attributed to Augustine of Hippo. Augustine himself in his Retractiones lists many of his works, while his disciple Possidius tried to provide a complete list in his Indiculus. Despite this check, false attributions to Augustine abound."
