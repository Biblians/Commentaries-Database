summary = "Theophilus of Alexandria was the 23rd Pope of Alexandria and Patriarch of the See of Saint Mark from 385 to 412. He is remembered as a pivotal figure in late antique Christianity, known for his assertive role in suppressing paganism and managing ecclesiastical disputes that shaped the doctrinal course of the early Church."
