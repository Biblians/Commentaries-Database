summary = "Benedict of Nursia, often known as Saint Benedict, was an Italian monk and the founder of the Order of Saint Benedict. He is famed in the Catholic Church, the Eastern Orthodox Church, the Lutheran Churches, the Anglican Communion, and Old Catholic Churches. In 1964, Pope Paul VI declared Benedict a patron saint of Europe."
