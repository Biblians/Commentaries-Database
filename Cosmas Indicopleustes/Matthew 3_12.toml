[[commentary]]
quote='''
proclaims him to be the Judge of all, saying: Whose fan is in his hand, and he will thoroughly cleanse his threshing-floor, and will gather the wheat into his garner; but the chaff he will burn with unquenchable fire.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
uuid = "b43d22a2-bf60-4fb9-9fb1-e17731e921af"

[[commentary]]
quote='''
In like manner also when John the Baptist was discoursing concerning the Lord, and was eager to show that in the future state He would be Judge of all, he also used the example about wheat and spake thus: Whose fan is in his hand and he will thoroughly cleanse his threshing-floor; and he will gather the wheat into his garner, but the chaff he will burn up with unquenchable fire.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
uuid = "b7af140d-70dc-4b8e-9dbf-af29218403a4"
