[[commentary]]
quote='''
I will smite the shepherd and the sheep of the flock shall be scattered. Of this passage also the Lord made mention at the time of his Passion, applying it to himself when he was on the point of being betrayed.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
