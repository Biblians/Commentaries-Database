[[commentary]]
quote='''
But after some time had elapsed, He is again found using an expression more distinctly plural when He says: Come, let us go down and confound their language—an expression which can no longer be thought applicable to two only, but to three or more.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
uuid = "408787d2-b98d-4424-95dc-ea5f44239fab"

[[commentary]]
quote='''
For the writers of Chaldaean history as being more ancient, and living farther east, have mentioned in their works both the deluge and the building of the Tower, since they saw that Tower with their own eyes under the process of construction, being no doubt well aware that the men of that time, in fear of another flood, erected it for themselves as a place of refuge and safety.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252012.html"
source_title="The Christian Topography, Book 12"
uuid = "7f7c3119-2555-4d8e-8d8b-1c4a15a7700d"
