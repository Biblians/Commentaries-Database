summary = "Leander of Seville was a Hispano-Roman Catholic prelate who served as Bishop of Seville. He was instrumental in effecting the conversion of the Visigothic kings Hermenegild and Reccared to Catholicism. His brother was the encyclopedist Isidore of Seville."
