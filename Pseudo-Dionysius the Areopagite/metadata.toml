summary = 'Pseudo-Dionysius the Areopagite was a Greek author, Christian theologian and Neoplatonic philosopher of the late 5th to early 6th century, who wrote a set of works known as the Corpus Areopagiticum or Corpus Dionysiacum. Through his writing in Mystical Theology, he has been identified as the "progenitor of apophatic or negative theology."'
