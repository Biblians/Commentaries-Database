summary = "The Book of Jubilees is an ancient Jewish apocryphal text of 50 chapters, considered canonical by the Ethiopian Orthodox Tewahedo Church, Eritrean Orthodox Tewahedo Church, as well as by Haymanot Judaism, a denomination observed by members of the Ethiopian Jewish community. Jubilees is considered one of the pseudepigrapha by the Eastern Orthodox, Catholic, and Protestant churches. Apart from Haymanot, the book is not considered canonical within any of the denominations of Judaism."
