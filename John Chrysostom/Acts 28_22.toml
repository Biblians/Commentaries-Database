[[commentary]]
quote='''
Neither through letters, nor through men, have they made known any harm of thee. Nevertheless, we wish to hear from thyself: "But we desire to hear of thee what thou thinkest": and then forestalled him by showing their own sentiments. "For as concerning this sect, it is known to us, that everywhere it is spoken against."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252055.html'
source_title="Homily on Acts 55"
uuid = "8cfd8e3d-131a-417b-9359-a4d76c1818fa"

[[commentary]]
quote='''
"As for this sect, it is known to us," say they, "that it is everywhere spoken against." True, but people are also everywhere persuaded, as "some were persuaded, and some believed not."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252055.html'
source_title="Homily on Acts 55"
uuid = "3eec331b-fd73-41a3-8404-f75b7757ff14"
