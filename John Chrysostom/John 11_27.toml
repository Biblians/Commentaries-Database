[[commentary]]
quote='''
(Hom. lxii. 3) She seems not to have understood His words; i. e. she saw that He meant something great, but did not see what that was. She is asked one thing, and answers another.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title="Catena Aurea by Aquinas"
