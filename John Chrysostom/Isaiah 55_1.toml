[[commentary]]
quote='''
As long as the virtues are found before us and are sold cheaply, let us take from the munificent One, let us grasp, let us purchase.… As long as the festival lasts, let us buy alms, or, better yet, let us purchase salvation through almsgiving. You clothe Christ when you clothe the poor.
'''
source_url=''
source_title="HOMILIES ON REPENTANCE AND ALMSGIVING 7:6.22"
uuid = "2a3e7da5-985c-4ea0-8997-1c6cb7d6bf07"
