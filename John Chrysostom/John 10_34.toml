[[commentary]]
quote='''
(Hom. lxi. 2) Our Lord did not correct the Jews, as if they misunderstood His speech, but confirmed and defended it, in the very sense in which they had taken it. Jesus answered them, Is it not written in your law, I said, Ye are gods?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title="Catena Aurea by Aquinas"
