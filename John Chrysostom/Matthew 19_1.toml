[[commentary]]
quote='''
Having constantly left Jud'a on account of the envy of those men, now He frequents it from this time forth, because the passion was to be nigh at hand; He goeth not up, however, unto Jerusalem for a while, but "into the coasts of Jud'a."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252062.html'
source_title="Homily on the Gospel of Matthew 62"
uuid = "077b79ad-98ff-4adc-8706-b91ac43ba759"
