[[commentary]]
quote='''
"Having forgiven us," he saith, "all our trespasses," those which produced that deadness. What then? Did He allow them to remain? No, He even wiped them out; He did not scratch them out merely; so that they could not be seen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Colossians%2FHomily%25206.html'
source_title="Homily on Colossians 6"
