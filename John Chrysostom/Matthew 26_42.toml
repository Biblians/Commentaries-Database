[[commentary]]
quote='''
And again He prayed in the same way, saying, "Father, if this cannot pass from me except I drink it, Thy will be done," showing here, that He fully harmonizes with God's will, and that we must always follow this, and seek after it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252083.html'
source_title="Homily on the Gospel of Matthew 83"
uuid = "4d15a6a9-1183-458b-9cd6-d3f88ed7bf22"
