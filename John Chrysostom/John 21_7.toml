[[commentary]]
quote='''
But when they recognized Him, the disciples Peter and John again exhibited the peculiarities of their several tempers. The one was more fervent, the other more lofty; the one more keen, the other more clear-sighted. On this account John first recognized Jesus, Peter first came to Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252087.html'
source_title="Homily on the Gospel of John 87"
uuid = "2e2a18dc-ee04-4927-8659-4b05e4279114"
