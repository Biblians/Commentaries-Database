[[commentary]]
quote='''
Eliphaz adds, "No stranger marched against them," that is, the wise are those who enjoy peace and transmit it to their descendants. "No stranger marched against them." This means they made no war nor saw any fight nor knew any revolt, but they stood with nobility and bravery. They did not only survive but also possessed great force and power and enjoyed a profound peace.
'''
source_url=''
source_title="COMMENTARY ON JOB 15:17-23B"
uuid = "0ed92f20-71a1-4a4c-a6d8-1e25dfbf39be"
