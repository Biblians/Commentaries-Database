[[commentary]]
quote='''
"For His Name only is exalted" [Psalm 148:13]. Let no man seek to exalt his own name. Will you be exalted? Subject yourself to Him who cannot be humbled.
'''
source_url='https://www.newadvent.org/fathers/1801148.htm'
source_title="Exposition on Psalm 148"
uuid = "817d2e1e-0fb9-4805-970f-848b3e9cc3aa"
