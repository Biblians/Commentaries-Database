[[commentary]]
quote='''
"Thou shalt bring Me out of this trap, which they have hidden for Me." Thou shalt bring Me out of these snares, which they have hidden for Me. "For Thou art My Protector."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%252031.html'
source_title="Exposition on Psalm 31"
