[[commentary]]
quote='''
"Our Fathers hoped in You." All the righteous, namely, who sought not their own praise, but Yours. "They hoped in You, and You delivered them" [Psalm 22:4].
'''
source_url='https://www.newadvent.org/fathers/1801022.htm'
source_title="Exposition on Psalm 22"
uuid = "616f9dad-e0f6-4d70-93bb-9500e0fce21e"
