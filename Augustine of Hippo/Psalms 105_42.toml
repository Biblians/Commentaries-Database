[[commentary]]
quote='''
But in all these blessings of His, God does commend in Abraham the merit of faith. For the Psalmist goes on to say, "For why? He remembered His holy promise, which He made to Abraham His servant" [Psalm 105:42].
'''
source_url='https://www.newadvent.org/fathers/1801105.htm'
source_title="Exposition on Psalm 105"
uuid = "7744bedd-c7a5-4ee2-8666-824b32b59c7b"
