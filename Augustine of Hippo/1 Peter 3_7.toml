[[commentary]]
quote='''
Is it true that such spouses do not think about the things of the Lord, how they might please him? They are very rare. Who denies this?
'''
source_url='https://www.newadvent.org/fathers/1309.htm'
source_title="On the Good of Marriage 12.14"
uuid = "02a5f384-546a-4e94-b004-4c0afa6a5cbb"
