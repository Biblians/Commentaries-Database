[[commentary]]
quote='''
We rejoice in hope in order to look forward to the rest to come and so conduct ourselves cheerfully in the midst of toils.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="LETTER 55"
uuid = "55fd14fa-c53e-471b-953b-24039b1f1c44"
