[[commentary]]
quote='''
"Who smote great kings" [Psalm 136:17], "and slew famous kings" [Psalm 136:18]. From us too He smites and slays the deadly powers of the devil.
'''
source_url='https://www.newadvent.org/fathers/1801136.htm'
source_title="Exposition on Psalm 136"
uuid = "5e3fc64e-c154-4c00-98a0-066bc162d924"
