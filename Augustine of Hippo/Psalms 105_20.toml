[[commentary]]
quote='''
"The king sent and loosed him, the prince of the peoples, and let him go free" [Psalm 105:20]. The "king" is the same as "the prince of the peoples:" he "loosed" him from his bonds "and let him go free" from his prison.
'''
source_url='https://www.newadvent.org/fathers/1801105.htm'
source_title="Exposition on Psalm 105"
uuid = "70f01787-f872-4dcd-a9bf-0ec797b9eb5c"
