[[commentary]]
quote='''
This applies to the second state of man, when he is under the law.
'''
source_url=''
source_title="AUGUSTINE ON ROMANS 23"
uuid = "afd4274c-f171-4699-9008-7b5ca38503bb"

[[commentary]]
quote='''
Paul said this because God's wrath is more severe toward a transgressor who knows sin by the law and still commits it.
'''
source_url=''
source_title="GRACE AND FREE WILL 10.22"
uuid = "e7d59b13-d23a-42ab-a251-37cbc65ba7da"
