[[commentary]]
quote='''
Lift up your eyes to the mountains, by all means, from where help shall come to you—but pay attention to him saying, I myself will be the shepherd.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%252046.html'
source_title="SERMON 46:25"
