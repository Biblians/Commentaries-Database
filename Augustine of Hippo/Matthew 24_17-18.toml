[[commentary]]
quote='''
(ubi sup.) For in tribulations we must beware of coming down from the spiritual heights, and yielding ourselves to the carnal life; or of failing and looking behind us, after having made some progress forwards.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252024.html'
source_title="Catena Aurea by Aquinas"
uuid = "a16c627b-ba6a-4080-8063-64bbb5fe37df"

[[commentary]]
quote='''
(Quæst. Ev. I. 37.) That no one be found in that day in either joy or sorrow for temporal things.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252024.html'
source_title="Catena Aurea by Aquinas"
uuid = "7d401242-7741-49fd-9e25-5c2e4bf3d9c6"
