summary = """
Pachomius, also known as Saint Pachomius the Great, is generally recognized as the founder of Christian cenobitic monasticism. 
In the Vita Pachumii, his name is recorded as Pachumius (Παχούμιος). Coptic churches celebrate his feast day on 9 May, and Eastern Orthodox and Catholic churches mark his feast on 15 May or 28 May. In Lutheranism, he is remembered as a renewer of the church, along with his contemporary, Anthony of Egypt on 17 January."""
