summary = "Basil of Caesarea, also called Saint Basil the Great, was an early Christian prelate. He served as Bishop of Caesarea Mazaca in Cappadocia from 370 until his death in 379. He was an influential theologian who supported the Nicene Creed and opposed heresies within the early Christian church such as Arianism and Apollinarianism."
