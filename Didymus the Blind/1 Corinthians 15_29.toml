[[commentary]]
quote='''
The Marcionites baptize the living on behalf of dead unbelievers, not knowing that baptism saves only the person who receives it.
'''
source_url='https://archive.org/details/MN41481ucmf_2/page/n61/mode/2up'
source_title="Pauline Commentary From the Greek Church: Collected and Edited Catena Writings, page 8 - original source unclear"
uuid = "698bf57d-7b10-4f5c-98f2-7d2d5cbafc98"
