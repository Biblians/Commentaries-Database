summary = "Didymus the Blind was a Christian theologian in the Church of Alexandria, where he taught for about half a century. He was a student of Origen, and, after the Second Council of Constantinople condemned Origen, Didymus's works were not copied. Many of his writings are lost, but some of his commentaries and essays survive. He was seen as intelligent and a good teacher."
