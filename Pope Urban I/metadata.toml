summary = "Pope Urban I, also known as Saint Urban (175?–230), was the bishop of Rome from 222 to 23 May 230. He was born in Rome and succeeded Callixtus I, who had been martyred. It was believed for centuries that Urban I was also martyred. However, recent historical discoveries now lead scholars to believe that he died of natural causes."
