summary = "Petrus Alphonsi was a Spanish physician, writer, astronomer and polemicist who was born and raised as a Jew and later in life converted to Christianity in 1106. He is also known just as Alphonsi, and as Peter Alfonsi or Peter Alphonso, and was born Moses Sephardi. Born in Islamic Spain, he mostly lived in England and France after his conversion."
