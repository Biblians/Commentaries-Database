summary = "Ildefonsus or Ildephonsus was a scholar and theologian who served as the Metropolitan Archbishop of Toledo for the last decade of his life. His Gothic name was Hildefuns. In the Ethiopian Orthodox Tewahedo Church he is known as Dexius based on the Ge'ez translation of legends about his life."
