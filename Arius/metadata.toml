summary = "Arius was a Cyrenaic presbyter and ascetic. He was not the founder of Arianism. The opposing sides in the Controversy were already well established before the dispute between Arius and Alexander. The Controversy was inevitable. Arius' dispute with his bishop initiated the controversy, but Arius, himself, was not important."
