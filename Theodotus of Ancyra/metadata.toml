summary = "Theodotus of Ancyra was a fifth-century bishop of Ancyra. He was a theologian who attended the Council of Ephesus in 431, during the reign of Byzantine Emperor Theodosius II. Although he had earlier supported the Nestorian theology of Nestorius, bishop of Constantinople, Theodotus at the council supported Patriarch Cyril of Alexandria in condemning Nestorius. Theodotus was condemned in turn by the Nestorians at their 432 Synod of Tarsus."
