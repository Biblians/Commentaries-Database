summary = "The Epistle of James is a general epistle and one of the 21 epistles in the New Testament. It was written originally in Koine Greek. The epistle aims to reach a wide Jewish audience. It survives in manuscripts from the 3rd century onward and is dated between the mid-1st and mid-2nd century AD."
