summary = "Agapius of Hierapolis, also called Maḥbūb ibn Qusṭanṭīn, was a Melkite Christian historian and the bishop of Manbij in Syria. He wrote a universal history in Arabic, the lengthy Kitāb al-ʿunwān. He was a contemporary of the annalist Eutychius, also a Melkite."
