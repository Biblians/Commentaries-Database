summary = "Adomnán or Adamnán of Iona, also known as Eunan, was an abbot of Iona Abbey (r. 679–704), hagiographer, statesman, canon jurist, and saint. He was the author of the Life of Columba, probably written between 697 and 700. This biography is by far the most important surviving work written in early-medieval Scotland, and is a vital source for our knowledge of the Picts, and an insight into the life of Iona and the early-medieval Gaelic monk."
