[[commentary]]
quote='''
Watch for your life's sake. Let not your lamps be quenched, nor your loins unloosed; but be ye ready, for ye know not the hour in which our Lord cometh.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Didache%2FDidache.html'
source_title="The Didache, Chapter 16"
uuid = "92fcd6be-445d-466b-95ee-8da3129df25d"
