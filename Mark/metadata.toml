summary = "The Gospel of Mark is the second of the four canonical Gospels and one of the three Synoptic Gospels. It narrates the ministry of Jesus from his baptism by John the Baptist to his death, the burial of his body, and the discovery of his empty tomb. It portrays Jesus as a teacher, an exorcist, a healer, and a miracle worker. Jesus refers to himself as the Son of Man and is called the Son of God, though he keeps his messianic nature secret; even his disciples fail to understand him. This is consistent with the Christian interpretation of prophecy, which is believed to foretell the fate of the Messiah as a suffering servant."
