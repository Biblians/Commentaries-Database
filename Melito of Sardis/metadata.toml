summary = "Melito of Sardis was a Roman Christian prelate who served as Bishop of Sardis, near Smyrna in western Anatolia. He held a foremost place among the early Christian bishops in Roman Asia due to his personal influence and his literary works, most of which have been lost. What has been recovered, however, has provided a great insight into Christianity during the second century."
