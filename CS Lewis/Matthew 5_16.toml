[[commentary]]
quote='''
Yet we all want to be tinkering. Even I would gladly see "Let your light so shine before men" removed from the offertory. It sounds, in that context, so like an exhortation to do our alms that they may be seen by men.
'''
source_url='https://gutenberg.ca/ebooks/lewiscs-letterstomalcolm/lewiscs-letterstomalcolm-00-h.html'
source_title="LETTERS TO MALCOLM: CHIEFLY ON PRAYER, Letter 1 (Paragraph 20)"
uuid = "190e82d3-d01e-4a4f-95de-055a27c9d0af"
