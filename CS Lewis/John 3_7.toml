[[commentary]]
quote='''
Here is the paradox of Christianity. As practical imperatives for here and now the two great commandments have to be translated "Behave as if you loved God and man." For no man can love because he is told to. Yet obedience on this practical level is not really obedience at all. And if a man really loved God and man, once again this would hardly be obedience; for if he did, he would be unable to help it. Thus the command really says to us, "Ye must be born again." Till then, we have duty, morality, the Law. A schoolmaster, as St. Paul says, to bring us to Christ.
'''
source_url='https://gutenberg.ca/ebooks/lewiscs-letterstomalcolm/lewiscs-letterstomalcolm-00-h.html'
source_title="LETTERS TO MALCOLM: CHIEFLY ON PRAYER, Letter 21"
