[[commentary]]
quote='''
The examples which (in me at any rate) can hardly fail to produce a smile may occur most disquietingly in Psalms we love; 143, after proceeding for eleven verses in a strain that brings tears to the eyes, adds in the twelfth, almost like an afterthought, "and of thy goodness slay mine enemies".
'''
source_url=''
source_title="Reflections on the Psalms, Chapter 3: The Cursings"
uuid = "225229b8-fa81-47cf-a0ee-5ae0bc6ca985"
