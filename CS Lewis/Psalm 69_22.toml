[[commentary]]
quote='''
And we get the refinement of malice in 69:22, "Let their table be made a snare to take themselves withal; and let the things that should have been for their wealth be unto them an occasion of falling."
'''
source_url=''
source_title="Reflections on the Psalms, Chapter 3: The Cursings"
