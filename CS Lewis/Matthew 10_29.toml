[[commentary]]
quote='''
I will not believe in the Managerial God and his general laws. If there is Providence at all, everything is providential and every providence is a special providence. The God of the New Testament who takes into account the death of every sparrow is not more, but far less, anthropomorphic than Pope's.
'''
source_url=''
source_title="Letters to Malcolm: Chiefly on Prayer, Letter 10"
uuid = "58f4d282-90bb-45c6-ac2f-e38a4216a3c8"
