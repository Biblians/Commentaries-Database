[[commentary]]
quote='''
The dangers of apparent self-sufficiency explain why Our Lord regards the vices of the feckless and dissipated so much more leniently than the vices that lead to worldly success. Prostitutes are in no danger of finding their present life so satisfactory that they cannot turn to God: the proud, the avaricious, the self-righteous, are in that danger.
'''
source_url=''
source_title="The Problem of Pain, Ch. 6"
uuid = "d2d9ed74-be3e-4f7d-b59d-7f230b898c04"

[[commentary]]
quote='''
There are two things inside me, competing with the human self which I must try to become. They are the Animal self, and the Diabolical self. The Diabolical self is the worse of the two. That is why a cold, self-righteous prig who goes regularly to church may be far nearer to hell than a prostitute. But, of course, it is better to be neither.
'''
source_url=''
source_title="Mere Christianity, Book 3, Chapter 5: Sexual Morality"
uuid = "d72f318b-c36e-4927-99ba-4c3a77986bcb"
