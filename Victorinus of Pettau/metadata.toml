summary = "Saint Victorinus of Pettau was an Early Christian ecclesiastical writer who flourished about 270, and who was martyred during the persecutions of Emperor Diocletian. A Bishop of Poetovio in Pannonia, Victorinus is also known as Victorinus Petavionensis or Poetovionensis. Victorinus composed commentaries on various texts within the Christians' Holy Scriptures."
