summary = "The Book of Steps is an anonymous Syriac treatise on spiritual direction, probably written in the late fourth century AD. The author appears to be living in the Sasanian Empire, perhaps somewhere near the Lesser Zab, as it is mentioned in Memra Thirty, and addresses the author's own Christian community."
