summary = "Shenoute of Atripe, also known as Shenoute the Great or Saint Shenoute the Archimandrite, was an Egyptian saint, and the abbot of the White Monastery in Egypt. He is considered a saint by the Oriental Orthodox Churches and is one of the most renowned saints of the Coptic Orthodox Church."
