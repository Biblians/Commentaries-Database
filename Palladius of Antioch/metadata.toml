summary = "Palladius of Antioch, also known as Saint Palladius the Desert Dweller and Palladius the Hermit, was an Early Christian monk in the Roman Empire. Palladius was a hermit in the desert near Antioch. He was a friend of Saint Simeon. Palladius died in 390 of natural causes and was canonized in pre-Congregation times."
