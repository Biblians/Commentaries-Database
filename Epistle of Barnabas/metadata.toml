summary = "The Epistle of Barnabas is an early Christian Greek epistle written between 70 and 135 AD. The complete text is preserved in the 4th-century Codex Sinaiticus, where it is positioned at the end of the New Testament, following the Book of Revelation and preceding the Shepherd of Hermas."
