summary = "Julian of Toledo (642–690) was born in Toledo, Hispania. He was well educated at the cathedral school, was a monk and later abbot at Agali, a spiritual student of Saint Eugene II, and archbishop of Toledo. He was the first bishop to have primacy over the entire Iberian Peninsula—a position he has been accused of securing by being complicit in 680 in the supposed poisoning of Wamba, king of the Visigoths—and he helped centralize the Iberian Church in Toledo. His elevation to the position of primate of the Visigothic church was a source of great unhappiness among the kingdom's clergy. And his views regarding the doctrine of the Trinity proved distressing to the Vatican."
