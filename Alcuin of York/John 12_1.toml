[[commentary]]
quote='''
As the time approached in which our Lord had resolved to suffer, He approached the place which He had chosen for the scene of His suffering: Then Jesus six days before the passover came to Bethany. First, He went to Bethany, then to Jerusalem; to Jerusalem to suffer, to Bethany to keep alive the recollection of the recent resurrection of Lazarus; Where Lazarus was, which had been dead, whom He raised from the dead.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title="Catena Aurea by Aquinas"
uuid = "78f8b4ed-ad85-4658-aea8-7f7320b03f73"

[[commentary]]
quote='''
Mystically, that He came to Bethany six days before the passover, means, that He who made all things in six days, who created man on the sixth, in the sixth age of the world, the sixth day, the sixth hour, came to redeem mankind.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title="Catena Aurea by Aquinas"
