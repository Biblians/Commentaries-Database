[[commentary]]
quote='''
We have heard of the patience of God, and of salvation preached amid revilings. They obstinately preferred tempting Him to obeying Him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title="Catena Aurea by Aquinas"
uuid = "cdebdae6-2bfb-4ecb-afbf-34da925dd3c9"

[[commentary]]
quote='''
They accuse Him of keeping their minds in suspense and uncertainty, who had come to save their souls.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title="Catena Aurea by Aquinas"
uuid = "ddbf7576-4076-4d74-9ec0-b233ca23a67f"
