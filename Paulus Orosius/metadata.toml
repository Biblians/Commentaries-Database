summary = "Paulus Orosius, less often Paul Orosius in English, was a Roman priest, historian and theologian, and a student of Augustine of Hippo. It is possible that he was born in Bracara Augusta, then capital of the Roman province of Gallaecia, which would have been the capital of the Kingdom of the Suebi by his death. Although there are some questions regarding his biography, such as his exact date of birth, it is known that he was a person of some prestige from a cultural point of view, as he had contact with the greatest figures of his time such as Augustine of Hippo and Jerome of Stridon. In order to meet with them Orosius travelled to cities on the southern coast of the Mediterranean Sea, such as Hippo Regius, Alexandria, and Jerusalem."
